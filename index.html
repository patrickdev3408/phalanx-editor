        ${uses>1
          ? html`<span class="share-badge">⚠ shared · used by ${uses}</span>
              <span class="note" style="margin:0;flex:1">Editing this action's data changes it everywhere it's used.</span>`
          : html`<span class="share-badge solo">● used by ${uses||1}</span>
              <span class="note" style="margin:0;flex:1">This action is only used here.</span>`}
        <span class="slug-chip">key: ${slug}</span>
        ${onFork?html`<button class="fork-btn" title="Create a copy of this action with a new slug and point this slot at it"
          onClick=${onFork}>⑂ Duplicate to new action</button>`:null}
      </div>`:null}
      ${act?html`<div class="dense-action"><${ActionEditorInlineAdapter} action=${act} effectRows=${effectRows} knownEffects=${knownEffects}
        summonOptions=${summonOptions||[{value:"",label:"— none —"}]} charById=${charById} tm=${data.type_matrix} effectByName=${effectByName} onChange=${onActionChange} /></div>`
        :html`<p class="note warn-text">Action "${slug}" not found in the library.</p>`}
    </div>`:null}
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   ACTIONS TAB
   ════════════════════════════════════════════════════════════════════ */
function ActionsTab({data,enums,charById,actionById,usageIdx,summonOptions,commitEdit,sel,setSel,jumpTo}){
  const [q,setQ]=useState("");
  const [fp,setFp]=useState("");   // pattern
  const [fg,setFg]=useState("");   // group: Type / Unique / <class>
  const [fdt,setFdt]=useState("");
  const [fsz,setFsz]=useState("");
  const [frg,setFrg]=useState("");
  const [fe1,setFe1]=useState("");
  const [fe2,setFe2]=useState("");

  const effectRows = EFFECT_GROUPS.map(g=>({label:g.label,names:g.names}));
  const knownEffects=useMemo(()=>new Set(enums.effects),[enums]);
  const effectByName=useMemo(()=>{ const m={}; (data.effects||[]).forEach(e=>{ if(e&&e.name) m[e.name]=e; }); return m; },[data.effects]);

  // Build the "action group" map: which actions are Type actions, class actions, or unique.
  const groupOf=useMemo(()=>{
    const m={};
    (data.types||[]).forEach(t=>{ if(t.type_attack) m[t.type_attack]="Type"; });
    ((data.classes&&data.classes.classes)||[]).forEach(cl=>{
      (cl.core_class_actions||[]).concat(cl.mastery_class_actions||[]).forEach(s=>{ if(!m[s]) m[s]=cl.class_name; });
    });
    return m;
  },[data]);

  const list=useMemo(()=>{
    return (data.actions||[]).filter(a=>{
      if(fp && a.aoe_pattern!==fp) return false;
      if(fdt!=="" && String(a.damage_type)!==String(fdt)) return false;
      if(fsz!=="" && String(a.aoe_size)!==String(fsz)) return false;
      if(frg!=="" && String(a.aoe_range)!==String(frg)) return false;
      const e1=a.effect1&&a.effect1.effect_type||"", e2=a.effect2&&a.effect2.effect_type||"";
      if(fe1 && e1!==fe1) return false;
      if(fe2 && e2!==fe2) return false;
      if(fg){
        const g=groupOf[a.id]||"Unique";
        if(fg==="Type" && g!=="Type") return false;
        else if(fg==="Unique" && g!=="Unique") return false;
        else if(fg!=="Type" && fg!=="Unique" && g!==fg) return false;
      }
      if(q){
        const hay=[a.id,a.name,a.aoe_pattern,e1,e2].map(x=>String(x||"").toLowerCase()).join(" ");
        if(!q.toLowerCase().split(/\s+/).every(w=>hay.includes(w))) return false;
      }
      return true;
    });
  },[data.actions,q,fp,fg,fdt,fsz,frg,fe1,fe2,groupOf]);

  const selId=sel.action || (list[0]&&list[0].id) || (data.actions[0]&&data.actions[0].id);
  const a=selId?actionById[selId]:null;

  const setField=(k,v)=>commitEdit(next=>{
    const aa=next.actions.find(x=>x.id===selId); if(aa) aa[k]=v;
  }, dy=>dy.actions.add(String(selId)));

  const usage=usageIdx[selId]||{chars:[],classes:[]};
  const issues=a?lintAction(a,charById):[];
  const fieldVis=useFieldVis();                                          // R5 — Name/Balance/Uses gating

  const groupFilterOpts=[{value:"",label:"Group: any"},{value:"Type",label:"Type actions"},{value:"Unique",label:"Unique"}]
    .concat(enums.classes.map(cn=>({value:cn,label:cn})));

  return html`<div class="view"><div class="split wide">
    <div class="list-pane">
      <div class="list-head">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7f8d95" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input class="search" placeholder="Search action / id / effect…" value=${q} onInput=${e=>setQ(e.target.value)} />
        </div>
        <div class="grid cols-2" style="margin-top:8px;gap:6px">
          <${Select} value=${fp} options=${[{value:"",label:"Pattern: any"}].concat(enums.aoe_patterns)} onInput=${setFp} />
          <${Select} value=${fg} options=${groupFilterOpts} onInput=${setFg} />
          <${Select} value=${fdt} options=${[{value:"",label:"Dmg type: any"}].concat(DAMAGE_TYPES)} onInput=${setFdt} />
          <${Select} value=${fsz} options=${[{value:"",label:"Size: any"},1,2,3,4,5,6]} onInput=${setFsz} />
          <${Select} value=${frg} options=${[{value:"",label:"Range: any"},0,1,2,3,4,5,6,7]} onInput=${setFrg} />
          <${Select} value=${fe1} options=${[{value:"",label:"Effect1: any"}].concat(enums.effects)} onInput=${setFe1} />
          <${Select} value=${fe2} options=${[{value:"",label:"Effect2: any"}].concat(enums.effects)} onInput=${setFe2} />
        </div>
      </div>
      <div class="list-meta">${list.length} action${list.length===1?"":"s"}${(q||fp||fg||fdt!==""||fsz!==""||frg!==""||fe1||fe2)?" (filtered)":""}</div>
      <div class="list-scroll">
        ${list.map(ac=>{
          const li=lintAction(ac,charById);
          const dt=DAMAGE_TYPES.find(d=>d.value===ac.damage_type);
          return html`<div class=${"row"+(ac.id===selId?" sel":"")} key=${ac.id} title=${actionSummaryText(ac)}
            onClick=${()=>setSel(s=>({...s,action:ac.id}))}>
            <${AoeThumb} pattern=${ac.aoe_pattern} size=${ac.aoe_size} range=${ac.aoe_range} />
            <span class="rname">${ac.name||"(unnamed)"}${li.some(x=>x.k==="err")?html`<span class="lint-flag" title=${li.map(x=>x.t).join("; ")}>⚠</span>`:null}</span>
            <span class="rmeta">${dt?dt.label:""}</span>
          </div>`;
        })}
      </div>
    </div>

    <div class="detail-pane">
      ${!a?html`<${Empty} big="Select an action" sub="Pick one to edit damage, AoE, effects and summon." />`:html`
        <div class="detail-head">
          <span class="id-tag mono">${a.id}</span>
          <span class="title">${a.name||"(unnamed)"}</span>
          <span class="spacer"></span>
          <span class="chip">${groupOf[a.id]||"Unique"}</span>
        </div>
        <div class="detail-body" style="max-width:920px">
          <${FieldChips} />
          <${Group} title="Identity">
            <div class="grid cols-2">
              ${fieldVis.has("name")?html`<${Field} label="Name"><${TextInput} value=${a.name} onInput=${v=>setField("name",v)} /></${Field}>`:null}
              <${Field} label="id (slug)" hint="rename = no auto-rewrite">
                <input class="mono" value=${a.id||""} onChange=${e=>{
                  const old=a.id, v=e.target.value.trim();
                  if(!v||v===old) return;
                  commitEdit(next=>{ const aa=next.actions.find(x=>x.id===old); if(aa) aa.id=v; },
                    dy=>{ dy.actions.delete(String(old)); dy.actions.add(String(v)); });
                  setSel(s=>({...s,action:v}));
                }} />
              </${Field}>
            </div>
          </${Group}>

          <${ActionEditorInline} action=${a} effectRows=${effectRows} knownEffects=${knownEffects}
            summonOptions=${summonOptions} charById=${charById} tm=${data.type_matrix} effectByName=${effectByName}
            onChangeField=${(k,v)=>setField(k,v)} />

          ${fieldVis.has("balance")?html`<${Group} title="Balance lab" >
            <${BalanceLab} action=${a} enums=${enums} types=${data.types} tm=${data.type_matrix} charById=${charById} />
          </${Group}>`:null}

          ${fieldVis.has("usage")?html`<${Group} title=${`Used by (${usage.chars.length} chars · ${usage.classes.length} classes)`}>
            ${(!usage.chars.length && !usage.classes.length)?html`<p class="note">Not referenced by any character or class.</p>`:html`
              <div class="usages">
                ${usage.chars.map(id=>{const cc=charById[String(id)];return html`<span class="usage-chip" onClick=${()=>jumpTo("character",String(id))}>
                  <span class="ut">char</span>${cc?cc.name:("#"+id)}</span>`;})}
                ${usage.classes.map(cn=>html`<span class="usage-chip" onClick=${()=>jumpTo("class",cn)}>
                  <span class="ut">class</span>${cn}</span>`)}
              </div>`}
          </${Group}>`:null}

          ${a.summon_character_id?(()=>{const sc=charById[String(a.summon_character_id)];
            return html`<${Group} title="Summon resolution">
              ${sc?html`<div class="usages"><span class="usage-chip" onClick=${()=>jumpTo("character",String(sc.id))}>
                <span class="ut">${sc.tier}</span>${sc.id}, ${sc.name}</span></div>`
                :html`<p class="note warn-text">Summon id "${a.summon_character_id}" not found in characters.</p>`}
            </${Group}>`;})():null}
        </div>
      `}
    </div>
  </div></div>`;
}

/* Balance lab — live Formula L preview vs a chosen defender type */
function BalanceLab({action, enums, types, tm, charById}){
  const [defType,setDefType]=useState("");
  const [defStat,setDefStat]=useState(50);
  const [atkStat,setAtkStat]=useState(()=> action.damage_type===1?120:80);
  // a synthetic caster carrying the chosen atk stat + the action's type
  const caster=useMemo(()=>({type_1:(action.action_type||"").trim(),
    stats:{attack:atkStat,special_attack:atkStat}}),[atkStat,action.action_type]);
  const defTypes=[{type:defType,pct:1}];
  const isDmg = num(action.damage_modifier,0)>0;
  const est = isDmg?estimateDamage(action,caster,defTypes,defStat,tm):null;

  // matchup table across all types (defender) at the current settings
  const rows = isDmg?(enums.types||[]).map(t=>{
    const e=estimateDamage(action,caster,[{type:t,pct:1}],defStat,tm);
    return {t, dmg:e?e.dmg:0, mult:e?e.mult:1};
  }).sort((a,b)=>b.dmg-a.dmg):[];

  if(!isDmg) return html`<p class="note">This is a support action (damage modifier 0) — no damage estimate. Edit damage modifier above to enable the lab.</p>`;

  return html`<div class="bl">
    <div class="blrow">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="dmgbig">~${est?est.dmg:"—"}</div>
        <div class="dmgsub">first-pass estimate · ${est?(est.atkType||"caster type_1"):""} @ ${est?est.mult.toFixed(2):"1.00"}×</div>
      </div>
      <div class="blfield"><label>Attacker stat</label>
        <input class="mono" type="number" value=${atkStat} onInput=${e=>setAtkStat(num(e.target.value,0))} /></div>
      <div class="blfield"><label>Defender type</label>
        <${Select} value=${defType} options=${[{value:"",label:"(neutral)"}].concat(enums.types)} onInput=${setDefType} /></div>
      <div class="blfield"><label>Defender DEF</label>
        <input class="mono" type="number" value=${defStat} onInput=${e=>setDefStat(num(e.target.value,1))} /></div>
    </div>
    <div class="dmgsub" style="margin-bottom:4px">Damage vs every defender type (atk ${atkStat}, def ${defStat}, modifier ${action.damage_modifier}):</div>
    <div style="max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:7px">
      <table class="dmgtable"><tbody>
        ${rows.map(r=>html`<tr><td class="nm">${r.t}</td><td class="mt">${r.mult.toFixed(2)}×</td><td class="dm">~${r.dmg}</td></tr>`)}
      </tbody></table>
    </div>
    <p class="note">Formula L: <span class="mono">max(1, eff_atk^1.05 · 115 / def^1.1)</span>, eff_atk = atk·(modifier + matchup − 1). Crit/variance/synergy excluded.</p>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   TYPES TAB (R3.6) — one action per type, bound to type.type_attack.
   Reuses the SlotCard collapse/AoE-thumb/pick-create-fork pattern.
   ════════════════════════════════════════════════════════════════════ */
function TypesTab({data,enums,charById,actionById,usageIdx,summonOptions,commitEdit,sel,setSel,jumpTo}){
  const [q,setQ]=useState("");
  const effectRows = EFFECT_GROUPS.map(g=>({label:g.label,names:g.names}));
  const knownEffects=useMemo(()=>new Set(enums.effects),[enums]);
  const effectByName=useMemo(()=>{ const m={}; (data.effects||[]).forEach(e=>{ if(e&&e.name) m[e.name]=e; }); return m; },[data.effects]);

  const types=Array.isArray(data.types)?data.types:[];
  const list=types.filter(t=>t&&t.type_name&&(!q||t.type_name.toLowerCase().includes(q.toLowerCase())));

  const t = types.find(x=>x&&x.type_name===selName);

  // characters carrying this type (cross-link, parallels the Classes tab)
  const typeChars=useMemo(()=>{
    const m={}; const get=(n)=>(m[n]=m[n]||[]);
    (data.characters||[]).forEach(ch=>{
      if(ch.type_1) get(ch.type_1).push(ch);
      if(ch.type_2 && ch.type_2!==ch.type_1) get(ch.type_2).push(ch);

  return html`<div class="view"><div class="split">

          const act=actionById[ty.type_attack];

            onClick=${()=>setSel(s=>({...s,type:ty.type_name}))}>

    <div class="detail-pane">
      ${!t?html`<${Empty} big="Select a type" sub="Each type has a single type action, inherited by every character of that type." />`:html`
        <div class="detail-head"><span class="title">${t.type_name}</span><span class="spacer"></span>
          <span class="chip">type action</span></div>
        <div class="detail-body" style="max-width:960px">
          <${Group} title="Type Action">
            <p class="note" style="margin-top:-4px;margin-bottom:8px">Bound to this type's <span class="mono">type_attack</span>. Editing the action's data changes it everywhere it's used. Collapsed = AoE thumbnail; expand to edit.</p>
            <${TypeSlotCard} type=${t} data=${data} actionById=${actionById} effectRows=${effectRows}
              knownEffects=${knownEffects} effectByName=${effectByName} summonOptions=${summonOptions}
              charById=${charById} usageIdx=${usageIdx} commitEdit=${commitEdit} selName=${selName} />
          </${Group}>

          <${Group} title=${`Characters with this type (${tChars.length})`}>
            <p class="note" style="margin-top:-4px;margin-bottom:8px">Cross-linked from each character's <span class="mono">type_1</span> / <span class="mono">type_2</span>. Click to jump.</p>
            ${tChars.length?html`<div class="classchars">
              ${tChars.map(ch=>html`<span class="cc-chip" key=${ch.id} onClick=${()=>jumpTo&&jumpTo("character",String(ch.id))}>
                <span class="ccx">${ch.type_1===t.type_name?"T1":"T2"}</span>${ch.name||("#"+ch.id)}</span>`)}
            </div>`:html`<p class="note">No character has this type yet.</p>`}
          </${Group}>
        </div>
      `}
    </div>
  </div></div>`;
}
/* single-slug slot card bound to a type's type_attack */
function TypeSlotCard({type, data, actionById, effectRows, knownEffects, effectByName, summonOptions, charById, usageIdx, commitEdit, selName}){
  const [open,setOpen]=useState(true);
  const [adding,setAdding]=useState(false);
  const [newId,setNewId]=useState("");
  const slug = type.type_attack || "";
  const act = slug ? actionById[slug] : null;
  const uses = usageCountOf(usageIdx, slug);
  const effNames = actionEffectNames(act);

  // change the bound slug on the type → marks the TYPES table dirty
  const setSlug=(s)=>commitEdit(next=>{
    const tt=(next.types||[]).find(x=>x&&x.type_name===selName); if(tt) tt.type_attack=s;
  }, dy=>dy.types=true);

  const onPick=(v)=>{
    if(!v){ setSlug(""); return; }
    setSlug(v);
  };
  const onCreate=(rawSlug)=>{
    const s=String(rawSlug||"").trim(); if(!s) return;
    if(actionById[s]){ setSlug(s); setAdding(false); return; }
    commitEdit(next=>{
      if(!next.actions.find(a=>a.id===s)) next.actions.push(newActionStub(s));
      const tt=(next.types||[]).find(x=>x&&x.type_name===selName); if(tt) tt.type_attack=s;
    }, dy=>{ dy.types=true; dy.actions.add(s); });
    setAdding(false);
  };
  const onFork=()=>{
    const src=actionById[slug]; if(!src) return;
    const newSlug=makeForkSlug(slug, actionById);
    commitEdit(next=>{
      if(!next.actions.find(a=>a.id===newSlug)){ const copy=clone(src); copy.id=newSlug; next.actions.push(copy); }
      const tt=(next.types||[]).find(x=>x&&x.type_name===selName); if(tt) tt.type_attack=newSlug;
    }, dy=>{ dy.types=true; dy.actions.add(newSlug); });
  };
  const onActionChange=(updatedAction)=>commitEdit(next=>{
    const i=next.actions.findIndex(a=>a.id===updatedAction.id);
    if(i>=0) next.actions[i]=updatedAction;
  }, dy=>dy.actions.add(String(updatedAction.id)));

  return html`<div class=${"slotcard"+(act?" filled":"")+(open?" expanded":"")}>
    <div class="sc-head" title=${actionSummaryText(act)} onClick=${()=>setOpen(o=>!o)}>
      <${AoeThumb} pattern=${act?act.aoe_pattern:null} size=${act?act.aoe_size:null} range=${act?act.aoe_range:null} />
      <span class="sc-slot">type_attack</span>
      <span class="sc-name">${act?(act.name||slug):(slug?html`<span class="unknown">⚠ ${slug} (unknown)</span>`:html`<span style="color:var(--ink-3);font-weight:500">— none —</span>`)}</span>
      ${act?html`<span class="sc-meta">${slotMeta(act)}</span>`:null}
      <span class="sc-caret">${open?"▾":"▸"}</span>
    </div>
    ${open?html`<div class="sc-body">
      <div class="grid cols-3" style="margin-bottom:8px">
        <${Field} label="Type action">
          <${Select} value=${slug} mono=${true} options=${[""].concat((data.actions||[]).map(a=>a.id))} onInput=${v=>onPick(v)} />
        </${Field}>
      </div>
      ${act?html`<div class=${"share-bar"+(uses>1?"":" solo")}>
        ${uses>1
          ? html`<span class="share-badge">⚠ shared · used by ${uses}</span>
              <span class="note" style="margin:0;flex:1">Editing this action's data changes it everywhere it's used.</span>`
          : html`<span class="share-badge solo">● used by ${uses||1}</span>
              <span class="note" style="margin:0;flex:1">This action is only used here.</span>`}
        <span class="slug-chip">key: ${slug}</span>
        <button class="fork-btn" title="Create a copy of this action with a new slug and point this type at it"
          onClick=${onFork}>⑂ Duplicate to new action</button>
      </div>`:null}
      <div style="display:flex;gap:8px;margin-bottom:8px">
        ${!adding?html`<button class="add-row" onClick=${()=>{setAdding(true);setNewId("");}}>+ Create a brand-new action</button>`:html`
          <input class="mono" style="flex:1" placeholder="new action slug (e.g. flame_lash)" value=${newId} onInput=${e=>setNewId(e.target.value.trim())} />
          <button class="btn primary" disabled=${!newId} onClick=${()=>onCreate(newId)}>Create & assign</button>
          <button class="btn ghost" onClick=${()=>setAdding(false)}>Cancel</button>
        `}
        ${slug?html`<button class="btn danger" onClick=${()=>setSlug("")}>Clear</button>`:null}
      </div>
      ${act?html`<div class="dense-action"><${ActionEditorInlineAdapter} action=${act} effectRows=${effectRows} knownEffects=${knownEffects}
        summonOptions=${summonOptions||[{value:"",label:"— none —"}]} charById=${charById} tm=${data.type_matrix} effectByName=${effectByName} onChange=${onActionChange} /></div>`
        :(slug?html`<p class="note warn-text">This type references "${slug}" but no such action exists. Pick another, or create it.</p>`:null)}
    </div>`:null}
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   EFFECTS TAB (reference, grouped + collapsible)
   ════════════════════════════════════════════════════════════════════ */
/* R2.13 — emphasize key words in a magnitude/duration description.
   Stat names → underlined+bold (<em>); effect-defining nouns + numbers → bold (<b>).
   Returns an array of preact vnodes (no raw-HTML injection). */
const EFFECT_STAT_WORDS = ["Special Attack","Special Defense","Special Atk","Special Def",
  "Attack","Defense","Speed","Crit Chance","Crit Bonus","Crit","Dodge","Regen","Health","Max HP","MaxHP","HP","Energy"];
const EFFECT_NOUN_WORDS = ["damage over time","damage","heal","healing","shield","stun","stunned","root","rooted",
  "silence","silenced","blind","blinded","curse","cursed","mark","marked","push","pull","summon","summoned",
  "lifesteal","thorns","cleanse","immunity","immune","aura","stack","stacks","percent","%","turn","turns","hex","hexes",
  "ramp","reflect","redirect","bleed","burn","poison","permanent"];
function emphasize(text){
  if(!text) return null;
  const s=String(text);
  // build a single alternation regex; longer phrases first so they win
  const esc=w=>w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const stat=EFFECT_STAT_WORDS.slice().sort((a,b)=>b.length-a.length);
  const noun=EFFECT_NOUN_WORDS.slice().sort((a,b)=>b.length-a.length);
  const re=new RegExp("("+stat.map(esc).join("|")+")|("+noun.map(esc).join("|")+")|(\\b\\d+(?:\\.\\d+)?%?\\b)","gi");
  const out=[]; let last=0,m;
  while((m=re.exec(s))){
    if(m.index>last) out.push(s.slice(last,m.index));
    if(m[1]) out.push(html`<em>${m[1]}</em>`);            // stat → underline+bold
    else if(m[2]) out.push(html`<b>${m[2]}</b>`);          // noun → bold accent
    else out.push(html`<b>${m[3]}</b>`);                   // number → bold accent
    last=re.lastIndex;
    if(re.lastIndex===m.index) re.lastIndex++; // guard against zero-width
  }
  if(last<s.length) out.push(s.slice(last));
  return out;
}
function EffectsTab({effects}){
  const byName=useMemo(()=>{ const m={}; (effects||[]).forEach(e=>{ if(e&&e.name) m[e.name]=e; }); return m; },[effects]);
  const [open,setOpen]=useState(()=>new Set(EFFECT_GROUPS.map((_,i)=>i))); // all open
  const grouped=new Set();
  EFFECT_GROUPS.forEach(g=>g.names.forEach(n=>grouped.add(n)));
  const ungrouped=(effects||[]).filter(e=>e&&e.name&&!grouped.has(e.name));
  const toggle=i=>setOpen(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n;});

  const card=(name)=>{
    const e=byName[name];
    if(!e) return html`<div class="ref-card tight" key=${name}><h3>${name}</h3><span class="cat">missing</span>
      <dl><dd class="warn-text">Not found in effects.json.</dd></dl></div>`;
    return html`<div class="ref-card tight" key=${name}>
      <h3>${e.name}</h3><span class="cat">${e.category||"effect"}</span>
      <dl>
        ${e.magnitude_meaning?html`<dd><span class="dlbl">mag</span>${emphasize(e.magnitude_meaning)}</dd>`:null}
        ${e.duration_meaning?html`<dd><span class="dlbl">dur</span>${emphasize(e.duration_meaning)}</dd>`:null}
        ${e.notes?html`<dd><span class="dlbl">note</span>${emphasize(e.notes)}</dd>`:null}
      </dl>
    </div>`;
  };

  return html`<div class="view"><div class="full-pane">
    <div class="group-title">Effects reference <span class="hint" style="color:var(--ink-3);font-weight:400;text-transform:none;letter-spacing:0">read-only · source of truth = effects.json / effects editor</span></div>
    <p class="note">${(effects||[]).length} effects. Grouped per the editor's effect taxonomy. Editing happens in the Godot effects editor, not here.</p>
    ${EFFECT_GROUPS.map((g,i)=>html`<div style="margin-bottom:12px" key=${i}>
      <div class="group-title" style="cursor:pointer;margin-bottom:6px" onClick=${()=>toggle(i)}>
        <span style="color:var(--ink-3);margin-right:6px">${open.has(i)?"▾":"▸"}</span>${g.label}
        <span class="badge" style="margin-left:8px;color:var(--ink-3);border:1px solid var(--line);border-radius:99px;padding:0 6px">${g.names.length}</span>
      </div>
      ${open.has(i)?html`<div class="ref-grid tight">${g.names.map(card)}</div>`:null}
    </div>`)}
    ${ungrouped.length?html`<div style="margin-bottom:12px">
      <div class="group-title">Other / ungrouped <span class="badge">${ungrouped.length}</span></div>
      <div class="ref-grid tight">${ungrouped.map(e=>card(e.name))}</div>
    </div>`:null}
  </div></div>`;
}

/* ════════════════════════════════════════════════════════════════════
   TYPE MATRIX TAB (condensed; cell tap → 0–2 step .25 dropdown)
   ════════════════════════════════════════════════════════════════════ */
function MatrixTab({types, matrix, commitEdit}){
  const [editing,setEditing]=useState(null); // "ATK:DEF"
  const [hover,setHover]=useState({r:-1,c:-1}); // R2.14 — crosshair
  const opts=useMemo(()=>{const o=[];for(let v=0;v<=2.0001;v+=0.25)o.push(+v.toFixed(2));return o;},[]);
  if(!types || !types.length) return html`<div class="view"><div class="full-pane"><p class="note">No types defined.</p></div></div>`;

  const setCell=(key,val)=>commitEdit(next=>{
    if(val===1) delete next.type_matrix[key]; else next.type_matrix[key]=val;
  }, dy=>dy.matrix=true);

  const cellClass=(v)=>{ if(v==null) return ""; if(v===1) return ""; if(v===0) return "imm"; return v>1?"sup":"eff"; };
  const clearHover=()=>setHover({r:-1,c:-1});

  return html`<div class="view"><div class="full-pane">
    <div class="group-title">Type effectiveness matrix</div>
    <p class="note">Rows = <b>attacker</b>, columns = <b>defender</b>. Click a cell → pick 0–2 (step 0.25). Hover highlights the row + column. Blank = neutral (1). <span style="color:var(--good)">&gt;1 super</span> · <span style="color:var(--rose)">&lt;1 resist</span> · <span style="color:var(--violet)">0 immune</span></p>
    <div class="table-wrap" style="max-height:calc(100vh - 220px)">
      <table class="tm-grid" onMouseLeave=${clearHover}>
        <thead><tr>
          <th><span style="opacity:.5;font-size:9px">ATK ↓ / DEF →</span></th>
          ${types.map((d,ci)=>html`<th class=${hover.c===ci?"tm-colhi":""} style="text-align:center">${d.slice(0,4)}</th>`)}
        </tr></thead>
        <tbody>
          ${types.map((atk,ri)=>html`<tr class=${hover.r===ri?"tm-rowhi":""} key=${atk}>
            <td class=${hover.r===ri?"tm-colhi":""}>${atk}</td>
            ${types.map((def,ci)=>{
              const key=atk+":"+def;
              const v=matrix[key];
              const shown=(v==null)?"":(Number.isInteger(v)?v:String(v));
              const hi=(hover.c===ci?" tm-colhi":"")+(hover.r===ri&&hover.c===ci?" tm-cellhi":"");
              if(editing===key){
                return html`<td class=${hi.trim()} style="padding:1px" key=${def}>
                  <select class="tm-cell mono" style="width:54px" autofocus
                    value=${v==null?1:v}
                    onBlur=${()=>setEditing(null)}
                    onChange=${e=>{ setCell(key, num(e.target.value,1)); setEditing(null); }}>
                    ${opts.map(o=>html`<option value=${o}>${o}</option>`)}
                  </select></td>`;
              }
              return html`<td class=${hi.trim()} style="text-align:center;padding:1px" key=${def}
                  onMouseEnter=${()=>setHover({r:ri,c:ci})}>
                <div class=${"tm-cell "+cellClass(v)} data-val=${v===1?"1":null}
                  title=${key} onClick=${()=>setEditing(key)}>${shown||(v==null?"":shown)}</div>
              </td>`;
            })}
          </tr>`)}
        </tbody>
      </table>
    </div>
  </div></div>`;
}

function AoeTab({patterns}){
  const byName=useMemo(()=>{ const m={}; (patterns||[]).forEach(p=>{ if(p&&p.name) m[p.name]=p; }); return m; },[patterns]);
  const [openPat,setOpenPat]=useState(null);
  // ordered list from the matrix rows; only patterns that actually exist
  const ordered=AOE_ROWS.flat().filter(n=>byName[n]);
  const extras=(patterns||[]).map(p=>p.name).filter(n=>!AOE_ROWS.flat().includes(n));

  const detail=(name)=>{
    const p=byName[name]; if(!p) return null;
    const sizes=aoeSizeOptions(name);          // already excludes even line sizes
    const ranges=AOE_RANGE_OPTIONS;
    return html`<div style="border:1px solid var(--line-2);border-radius:10px;background:var(--bg-2);padding:16px 18px;margin:8px 0 16px">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px">

      </div>
      <dl style="margin:0 0 12px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:11.5px">
        ${p.size_meaning?html`<dt style="color:var(--ink-3);font-family:var(--mono);font-size:10px;text-transform:uppercase">size</dt><dd style="margin:0;color:var(--ink-2)">${p.size_meaning}</dd>`:null}
        ${p.range_meaning?html`<dt style="color:var(--ink-3);font-family:var(--mono);font-size:10px;text-transform:uppercase">range</dt><dd style="margin:0;color:var(--ink-2)">${p.range_meaning}</dd>`:null}
        ${p.notes?html`<dt style="color:var(--ink-3);font-family:var(--mono);font-size:10px;text-transform:uppercase">notes</dt><dd style="margin:0;color:var(--ink-2)">${p.notes}</dd>`:null}
      </dl>
      <div class="note" style="margin-bottom:6px">Exported card images (~half size) — size (rows) × range (cols). Placeholder shown until the Godot PNG export exists.</div>
      <div style="overflow:auto">
        <div class="aoe-mtx half" style=${"grid-template-columns:repeat("+(ranges.length+1)+",minmax(34px,72px))"}>
          <div></div>
          ${ranges.map(r=>html`<div class="aoe-cell lbl" style="border:none;background:none;padding:2px">r${r}</div>`)}
          ${sizes.map(s=>html`
            <div class="aoe-cell lbl" style="border:none;background:none;display:flex;align-items:center;justify-content:center">s${s}</div>
            ${ranges.map(r=>html`<div class="aoe-cell">
              <${AoeThumb} pattern=${name} size=${s} range=${r} big=${true} />
            </div>`)}
          `)}
        </div>
      </div>
    </div>`;
  };

  return html`<div class="view"><div class="full-pane">
    <div class="group-title">AoE pattern reference <span class="hint" style="color:var(--ink-3);font-weight:400;text-transform:none;letter-spacing:0">read-only · Godot-exported PNGs</span></div>
    <p class="note" style="margin-bottom:12px">${ordered.length} patterns. Click a pattern to expand its description + the exported card-image matrix. Even-sized line widths are excluded (invalid).</p>
    ${AOE_ROWS.map((row,ri)=>{
      const present=row.filter(n=>byName[n]);
      if(!present.length) return null;
      return html`<div style="margin-bottom:8px" key=${ri}>
        <div class="filter-row">
          ${present.map(n=>html`<button class=${"pill"+(openPat===n?" on":"")} onClick=${()=>setOpenPat(p=>p===n?null:n)}>${n}</button>`)}
        </div>
        ${present.includes(openPat)?detail(openPat):null}
      </div>`;
    })}
    ${extras.length?html`<div style="margin-top:14px">
      <div class="group-title">Other patterns in data</div>
      <div class="filter-row">${extras.map(n=>html`<button class=${"pill"+(openPat===n?" on":"")} onClick=${()=>setOpenPat(p=>p===n?null:n)}>${n}</button>`)}</div>
      ${extras.includes(openPat)?detail(openPat):null}
    </div>`:null}
  </div></div>`;
}

/* ════════════════════════════════════════════════════════════════════
   SAVE DIALOG
   ════════════════════════════════════════════════════════════════════ */
function SaveDialog({data, dirty, onCancel, onConfirm}){
  const rows=[];
  if(dirty.chars.size) rows.push(["Characters",[...dirty.chars].map(id=>{const c=data.characters.find(x=>String(x.id)===id);return c?c.name:("#"+id);}).join(", ")]);
  if(dirty.actions.size) rows.push(["Actions",[...dirty.actions].join(", ")]);
  if(dirty.classes) rows.push(["Classes","whole document"]);
  if(dirty.effects) rows.push(["Effects","whole array"]);
  if(dirty.matrix) rows.push(["Type matrix","changed cells"]);
  if(dirty.types) rows.push(["Types","whole array"]);
  if(dirty.tunables) rows.push(["Balance tunables","whole array"]);
  return html`<div class="scrim" onClick=${e=>{if(e.target.classList.contains("scrim"))onCancel();}}>
    <div class="dialog">
      <div class="dh">↟ Save to Supabase</div>
      <div class="db">
        <div class="change-summary">
          ${rows.map(([k,v])=>html`<div class="cs-row"><b>${k}</b><span style="opacity:.85;text-align:right;overflow:hidden;text-overflow:ellipsis">${v}</span></div>`)}
        </div>
        <p class="note">Upserts only the changed rows into the live Supabase tables (anon read / auth write). After saving, run the GitHub Action to publish into the game data files.</p>
      </div>
      <div class="df">
        <button class="btn ghost" onClick=${onCancel}>Cancel</button>
        <button class="btn primary" onClick=${onConfirm}>Save changes</button>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   COMMAND PALETTE (Ctrl-K)
   ════════════════════════════════════════════════════════════════════ */
function CommandPalette({data, onJump, onClose}){
  const [q,setQ]=useState("");
  const [idx,setIdx]=useState(0);
  const items=useMemo(()=>{
    const out=[];
    (data.characters||[]).forEach(c=>out.push({kind:"character",id:String(c.id),name:c.name||"(unnamed)",sub:c.id}));
    (data.actions||[]).forEach(a=>out.push({kind:"action",id:a.id,name:a.name||a.id,sub:a.id}));
    ((data.classes&&data.classes.classes)||[]).forEach(c=>out.push({kind:"class",id:c.class_name,name:c.class_name,sub:"class"}));
    (data.effects||[]).forEach(e=>out.push({kind:"effect",id:e.name,name:e.name,sub:"effect"}));
    return out;
  },[data]);
  const filtered=useMemo(()=>{
    if(!q) return items.slice(0,40);
    const ql=q.toLowerCase();
    return items.filter(it=> it.name.toLowerCase().includes(ql) || String(it.sub).toLowerCase().includes(ql) || fuzzy(q,it.name)).slice(0,60);
  },[q,items]);
  useEffect(()=>{ setIdx(0); },[q]);
  const onKey=(e)=>{
    if(e.key==="ArrowDown"){ e.preventDefault(); setIdx(i=>Math.min(i+1,filtered.length-1)); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); setIdx(i=>Math.max(i-1,0)); }
    else if(e.key==="Enter"){ e.preventDefault(); const it=filtered[idx]; if(it) onJump(it.kind,it.id); }
    else if(e.key==="Escape"){ onClose(); }
  };
  return html`<div class="cmdk-scrim" onClick=${e=>{if(e.target.classList.contains("cmdk-scrim"))onClose();}}>
    <div class="cmdk">
      <input class="cmdk-in" placeholder="Jump to character / action / class / effect…" autofocus
        value=${q} onInput=${e=>setQ(e.target.value)} onKeyDown=${onKey} />
      <div class="cmdk-list">
        ${filtered.length?filtered.map((it,i)=>html`<div class=${"cmdk-item"+(i===idx?" active":"")} key=${it.kind+it.id}
          onMouseEnter=${()=>setIdx(i)} onClick=${()=>onJump(it.kind,it.id)}>
          <span class="ki">${it.kind.slice(0,4)}</span>
          <span class="kn">${it.name}</span>
          <span class="kid">${it.sub}</span>
        </div>`):html`<div class="cmdk-empty">No matches.</div>`}
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════════ */
render(html`<${App} />`, document.getElementById("app"));
</script>
