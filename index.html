<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phalanx Data Editor · v2</title>
<style>
/* ──────────────────────────────────────────────────────────────────
   Phalanx Data Editor — single-file dark data tool (v2 / Preact).
   The base <style> is carried verbatim from index.html; v2-only
   classes are appended at the bottom of this block.
   ────────────────────────────────────────────────────────────────── */
:root{
  --bg:#0b0e10;
  --bg-2:#0f1316;
  --panel:#12181c;
  --panel-2:#161d22;
  --line:#222c32;
  --line-2:#2c3a42;
  --ink:#e6edf0;
  --ink-2:#aebac1;
  --ink-3:#6f7e87;
  --accent:#28e0c8;
  --accent-2:#19b6a4;
  --accent-dim:#0d3b38;
  --amber:#f0a24b;
  --rose:#f56a7a;
  --violet:#9b8cf0;
  --good:#46d39a;
  --hero:#f0a24b;
  --lieutenant:#5fb0ff;
  --minion:#8b97a0;
  --radius:7px;
  --mono:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --sans:"Inter var","Segoe UI",system-ui,-apple-system,sans-serif;
  --topbar-h:54px;
  --tabbar-h:42px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--sans);font-size:13px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 500px at 100% -10%,rgba(40,224,200,.045),transparent 70%),
    radial-gradient(700px 400px at -5% 110%,rgba(155,140,240,.04),transparent 70%);
  background-attachment:fixed;
}
::selection{background:rgba(40,224,200,.28);color:#fff}
.mono{font-family:var(--mono);font-feature-settings:"liga" 0}
button{font-family:inherit}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#283238;border:3px solid transparent;background-clip:padding-box;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#3a474f;background-clip:padding-box}

/* ── top bar ───────────────────────────────────────────────────── */
.topbar{
  height:var(--topbar-h);display:flex;align-items:center;gap:18px;
  padding:0 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#10161a,#0c1114);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:baseline;gap:10px;user-select:none}
.brand .glyph{
  font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent);
  letter-spacing:-1px;
}
.brand h1{font-size:14px;font-weight:600;letter-spacing:.3px;margin:0}
.brand .sub{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.topbar .spacer{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 12px;
  border:1px solid var(--line-2);border-radius:99px;background:var(--panel);
  font-size:11.5px;color:var(--ink-2);text-decoration:none;white-space:nowrap;
  font-family:var(--mono);
}
.chip.pr-open{border-color:var(--accent-2);color:var(--accent);background:rgba(40,224,200,.06)}
.chip.pr-open:hover{background:rgba(40,224,200,.12)}
.chip .dot{width:7px;height:7px;border-radius:99px;background:var(--ink-3)}
.chip.pr-open .dot{background:var(--accent);box-shadow:0 0 0 3px rgba(40,224,200,.16)}
.btn{
  height:32px;padding:0 14px;border-radius:var(--radius);cursor:pointer;
  border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink);
  font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:8px;
  transition:.12s background,.12s border-color,.12s transform;
}
.btn:hover{background:#1c252b;border-color:#384850}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent}
.btn.primary{
  background:linear-gradient(180deg,var(--accent),var(--accent-2));
  color:#04201d;border-color:transparent;font-weight:700;
}
.btn.primary:hover{filter:brightness(1.07)}
.btn.primary:disabled{background:#1a2226;color:var(--ink-3);filter:none}
.btn .count{
  font-family:var(--mono);font-size:11px;font-weight:700;
  background:rgba(4,32,29,.35);padding:1px 7px;border-radius:99px;
}
.btn.danger{color:var(--rose);border-color:#48272d}
.btn.danger:hover{background:rgba(245,106,122,.1)}

/* ── tabs ──────────────────────────────────────────────────────── */
.tabbar{
  height:var(--tabbar-h);display:flex;align-items:stretch;gap:2px;padding:0 12px;
  border-bottom:1px solid var(--line);background:var(--bg-2);
  position:sticky;top:var(--topbar-h);z-index:40;
}
.tab{
  border:none;background:none;color:var(--ink-3);cursor:pointer;
  padding:0 16px;font-size:12.5px;font-weight:600;letter-spacing:.2px;
  position:relative;display:inline-flex;align-items:center;gap:7px;
}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--accent)}
.tab.active::after{
  content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2px;
  background:var(--accent);border-radius:2px 2px 0 0;
}
.tab .badge{
  font-family:var(--mono);font-size:10px;color:var(--ink-3);
  border:1px solid var(--line);border-radius:99px;padding:0 6px;line-height:15px;
}
.tab.active .badge{color:var(--accent);border-color:var(--accent-dim)}
.tab .dirtydot{width:6px;height:6px;border-radius:99px;background:var(--amber);display:none}
.tab.has-dirty .dirtydot{display:inline-block}

/* ── layout ────────────────────────────────────────────────────── */
.view{height:calc(100vh - var(--topbar-h) - var(--tabbar-h))}
.split{display:grid;grid-template-columns:340px 1fr;height:100%}
.split.wide{grid-template-columns:380px 1fr}
.list-pane{
  border-right:1px solid var(--line);background:var(--bg-2);
  display:flex;flex-direction:column;min-height:0;
}
.detail-pane{overflow:auto;min-height:0;position:relative}
.full-pane{overflow:auto;height:100%;padding:22px 26px}

/* ── list ──────────────────────────────────────────────────────── */
.list-head{
  padding:12px 12px 10px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--bg-2);z-index:3;
}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
.search{
  width:100%;height:34px;padding:0 10px 0 32px;border-radius:var(--radius);
  background:var(--panel);border:1px solid var(--line-2);color:var(--ink);
  font-size:12.5px;outline:none;
}
.search:focus{border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(40,224,200,.1)}
.filter-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.pill{
  border:1px solid var(--line-2);background:var(--panel);color:var(--ink-3);
  border-radius:99px;padding:3px 11px;font-size:11px;cursor:pointer;font-weight:600;
}
.pill:hover{color:var(--ink-2)}
.pill.on{background:var(--accent-dim);border-color:var(--accent-2);color:var(--accent)}
.list-scroll{overflow:auto;flex:1;min-height:0}
.list-meta{padding:7px 14px;font-size:10.5px;color:var(--ink-3);font-family:var(--mono);
  border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.6px}
.row{
  display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;
  border-bottom:1px solid #171f24;position:relative;
}
.row:hover{background:#141b20}
.row.sel{background:rgba(40,224,200,.07)}
.row.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.row.dirty .rid::after{content:"●";color:var(--amber);margin-left:6px;font-size:9px;vertical-align:middle}
.row .rid{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);min-width:30px}
.row .rname{flex:1;font-weight:600;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .rmeta{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);white-space:nowrap}
.tier-tag{
  font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;font-family:var(--mono);
}
.tier-hero{color:var(--hero);background:rgba(240,162,75,.13)}
.tier-lieutenant{color:var(--lieutenant);background:rgba(95,176,255,.13)}
.tier-minion{color:var(--minion);background:rgba(139,151,160,.13)}
.type-swatch{font-size:10px;font-family:var(--mono);color:var(--ink-2)}

/* ── detail form ───────────────────────────────────────────────── */
.detail-head{
  position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#11171b,#0e1316ee);
  backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
  padding:16px 24px;display:flex;align-items:center;gap:14px;
}
.detail-head .title{font-size:18px;font-weight:700;letter-spacing:-.2px}
.detail-head .id-tag{font-family:var(--mono);font-size:11px;color:var(--accent);
  background:var(--accent-dim);padding:2px 8px;border-radius:5px}
.detail-head .spacer{flex:1}
.detail-body{padding:18px 24px 90px;max-width:1100px}
.empty-state{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--ink-3);gap:14px;text-align:center;
}
.empty-state .big{font-family:var(--mono);font-size:13px;letter-spacing:1px;text-transform:uppercase;opacity:.7}

.group{margin-bottom:22px}
.group>legend,.group-title{
  font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:9px;
  width:100%;
}
.group-title::after{content:"";flex:1;height:1px;background:var(--line)}
fieldset.group{border:none;padding:0;margin:0 0 22px}
.grid{display:grid;gap:11px 16px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-5{grid-template-columns:repeat(5,1fr)}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
.field>label{font-size:10.5px;color:var(--ink-3);font-weight:600;letter-spacing:.3px;
  display:flex;align-items:center;gap:6px}
.field>label .hint{color:var(--ink-3);opacity:.65;font-weight:400;font-family:var(--mono);font-size:9.5px}
input[type=text],input[type=number],select,textarea{
  width:100%;height:32px;padding:0 9px;border-radius:6px;
  background:var(--panel);border:1px solid var(--line-2);color:var(--ink);
  font-size:12.5px;font-family:var(--sans);outline:none;transition:.1s border-color,.1s box-shadow;
}
input.mono,select.mono{font-family:var(--mono);font-size:11.5px}
textarea{height:auto;min-height:64px;padding:8px 9px;resize:vertical;line-height:1.5}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(40,224,200,.1)
}
input.invalid{border-color:var(--rose)!important;box-shadow:0 0 0 3px rgba(245,106,122,.12)!important}
select{appearance:none;cursor:pointer;
  background-image:linear-gradient(45deg,transparent 50%,var(--ink-3) 50%),linear-gradient(135deg,var(--ink-3) 50%,transparent 50%);
  background-position:calc(100% - 15px) 14px,calc(100% - 10px) 14px;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:26px}
input[type=number]::-webkit-inner-spin-button{opacity:.35}

/* toggles */
.flags{display:flex;gap:10px;flex-wrap:wrap}
.toggle{
  display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;
  border:1px solid var(--line-2);background:var(--panel);border-radius:7px;
  padding:8px 13px;font-size:12px;font-weight:600;color:var(--ink-2);
}
.toggle:hover{border-color:#384850}
.toggle input{display:none}
.toggle .sw{width:30px;height:17px;border-radius:99px;background:#2a343a;position:relative;transition:.15s;flex:none}
.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:99px;background:#7a8990;transition:.15s}
.toggle.on{color:var(--ink);border-color:var(--accent-2)}
.toggle.on .sw{background:var(--accent-2)}
.toggle.on .sw::after{left:15px;background:#04201d}

/* repeatable rows */
.rep{display:flex;flex-direction:column;gap:8px}
.rep-item{
  display:grid;gap:8px;align-items:end;
  background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:10px;
  position:relative;
}
.rep-item .field>label{font-size:9.5px}
.rep-del{
  background:none;border:1px solid var(--line-2);color:var(--ink-3);cursor:pointer;
  width:30px;height:32px;border-radius:6px;font-size:15px;line-height:1;flex:none;
}
.rep-del:hover{color:var(--rose);border-color:#48272d;background:rgba(245,106,122,.08)}
.add-row{
  align-self:flex-start;margin-top:2px;border:1px dashed var(--line-2);background:transparent;
  color:var(--ink-2);cursor:pointer;border-radius:6px;padding:7px 13px;font-size:11.5px;font-weight:600;
}
.add-row:hover{border-color:var(--accent-2);color:var(--accent)}
.add-row:disabled{opacity:.4;cursor:not-allowed}

/* action slots */
.slots{display:flex;flex-direction:column;gap:6px}
.slot{
  display:grid;grid-template-columns:120px 1fr 120px 110px 30px;gap:9px;align-items:center;
  padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);
}
.slot.filled{border-color:var(--line-2);background:var(--panel-2)}
.slot .slot-label{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot.filled .slot-label{color:var(--accent)}
.slot .resolved{font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .resolved .unknown{color:var(--rose)}
.slot select,.slot input{height:28px;font-size:11px}
.slot .slot-clr{background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:14px;text-align:center}
.slot .slot-clr:hover{color:var(--rose)}

/* card art */
.art-block{display:flex;gap:18px;align-items:flex-start}
.art-frame{
  width:200px;height:280px;border:1px solid var(--line-2);border-radius:10px;
  background:var(--panel) repeating-linear-gradient(45deg,#0e1316,#0e1316 8px,#10161a 8px,#10161a 16px);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none;position:relative;
}
.art-frame img{width:100%;height:100%;object-fit:cover;display:block}
.art-frame .noart{color:var(--ink-3);font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-align:center;padding:0 16px}

/* effects / type-matrix tables */
.table-wrap{border:1px solid var(--line);border-radius:9px;overflow:auto;background:var(--bg-2)}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12px}
thead th{
  position:sticky;top:0;z-index:2;background:#121a1f;color:var(--ink-2);
  font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-2);white-space:nowrap;
}
tbody td{padding:5px 8px;border-bottom:1px solid #161e23;vertical-align:middle}
tbody tr:hover{background:#121a1f}
table input{height:28px;background:transparent;border:1px solid transparent;font-size:12px}
table input:hover{border-color:var(--line)}
table input:focus{background:var(--panel);border-color:var(--accent-2)}
.tm-grid td:first-child,.tm-grid th:first-child{
  position:sticky;left:0;background:#121a1f;z-index:1;font-family:var(--mono);
  font-size:10.5px;color:var(--ink-2);font-weight:700;border-right:1px solid var(--line-2);white-space:nowrap;
}
.tm-grid thead th:first-child{z-index:3}
.tm-cell{width:54px;height:26px;text-align:center;font-family:var(--mono);font-size:11px;
  border:1px solid transparent;border-radius:4px;background:transparent;color:var(--ink-2);cursor:pointer}
.tm-cell:hover{border-color:var(--line-2)}
.tm-cell:focus{background:var(--panel);border-color:var(--accent-2);color:var(--ink);outline:none}
.tm-cell[data-val="1"]{color:var(--ink-3);opacity:.55}
.tm-cell.sup{color:var(--good);background:rgba(70,211,154,.07)}
.tm-cell.eff{color:var(--rose);background:rgba(245,106,122,.07)}
.tm-cell.imm{color:var(--violet);background:rgba(155,140,240,.1)}

/* reference cards */
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.ref-card{
  border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:15px 16px;
  position:relative;overflow:hidden;
}
.ref-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-2);opacity:.6}
.ref-card h3{margin:0 0 3px;font-size:14px;font-weight:700}
.ref-card .cat{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px}
.ref-card dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:11.5px}
.ref-card dt{color:var(--ink-3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
.ref-card dd{margin:0;color:var(--ink-2)}

/* none-toggle wrap for effect blocks */
.subgroup{border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--bg-2)}
.subgroup.off{opacity:.5}
.subgroup .sg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.subgroup .sg-head h4{margin:0;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-2)}

/* reorder controls */
.reorder{display:flex;flex-direction:column}
.reorder .ritem{
  display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;
  border:1px solid var(--line);border-radius:6px;background:var(--panel);padding:5px 6px 5px 10px;margin-bottom:5px;
}
.reorder .ritem .slug{font-family:var(--mono);font-size:11px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reorder .ritem .rname2{font-size:10.5px;color:var(--ink-3);margin-left:8px}
.mini{width:26px;height:26px;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink-2);
  border-radius:5px;cursor:pointer;font-size:12px;line-height:1;padding:0}
.mini:hover{border-color:#384850;color:var(--ink)}
.mini:disabled{opacity:.3;cursor:not-allowed}
.mini.del:hover{color:var(--rose);border-color:#48272d}
.mini.move{width:auto;padding:0 6px;font-size:11px;font-weight:600}
.mini.move:hover{color:var(--accent,#5ab);border-color:#2e5560}
.add-slug{display:flex;gap:6px;margin-top:4px}
.add-slug select{flex:1}

.legacy-toggle{cursor:pointer;color:var(--ink-3);font-size:11px;font-family:var(--mono);
  display:inline-flex;align-items:center;gap:6px;user-select:none;margin-bottom:8px}
.legacy-toggle:hover{color:var(--ink-2)}
.legacy-body{display:none}
.legacy-body.open{display:block}

/* dialog + toast */
.scrim{position:fixed;inset:0;background:rgba(4,7,9,.6);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:100}
.dialog{
  width:min(560px,92vw);background:var(--panel);border:1px solid var(--line-2);
  border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.55);overflow:hidden;
}
.dialog .dh{padding:16px 20px;border-bottom:1px solid var(--line);font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.dialog .db{padding:18px 20px}
.dialog .df{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--bg-2)}
.change-summary{
  font-family:var(--mono);font-size:11.5px;color:var(--ink-2);background:var(--bg-2);
  border:1px solid var(--line);border-radius:7px;padding:11px 13px;margin-bottom:14px;
  display:flex;flex-direction:column;gap:4px;max-height:200px;overflow:auto;
}
.change-summary .cs-row{display:flex;justify-content:space-between;gap:14px}
.change-summary .cs-row b{color:var(--accent)}

.toast-wrap{position:fixed;right:18px;bottom:18px;z-index:200;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.toast{
  background:var(--panel-2);border:1px solid var(--line-2);border-left:3px solid var(--accent);
  border-radius:9px;padding:12px 15px;min-width:280px;max-width:420px;
  box-shadow:0 16px 40px rgba(0,0,0,.5);font-size:12.5px;color:var(--ink);
  animation:toastIn .25s cubic-bezier(.2,.9,.3,1);
}
.toast.err{border-left-color:var(--rose)}
.toast.warn{border-left-color:var(--amber)}
.toast a{color:var(--accent);font-weight:700}
.toast .tt{font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.toast .tb{color:var(--ink-2);line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

.loading-shade{position:fixed;inset:0;background:rgba(4,7,9,.55);display:flex;align-items:center;justify-content:center;z-index:150;font-family:var(--mono);color:var(--accent);letter-spacing:2px;font-size:12px}
.spinner{width:13px;height:13px;border:2px solid rgba(40,224,200,.25);border-top-color:var(--accent);border-radius:99px;display:inline-block;margin-right:10px;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.hk{font-family:var(--mono);font-size:10px;color:var(--ink-3);border:1px solid var(--line);border-radius:4px;padding:1px 5px;background:var(--panel)}
.note{font-size:11px;color:var(--ink-3);margin-top:4px}
.warn-text{color:var(--amber)}

/* ════════════════════════════════════════════════════════════════════
   V2-ONLY ADDITIONS
   ════════════════════════════════════════════════════════════════════ */
/* error boundary fallback */
.errbox{margin:28px;padding:20px 22px;border:1px solid #48272d;border-left:3px solid var(--rose);
  border-radius:10px;background:rgba(245,106,122,.05);color:var(--ink)}
.errbox h3{margin:0 0 8px;color:var(--rose);font-size:14px}
.errbox pre{margin:8px 0 0;font-family:var(--mono);font-size:11px;color:var(--ink-2);
  white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto;
  background:var(--bg-2);padding:10px;border-radius:6px;border:1px solid var(--line)}

/* warning chips (linting) */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0}
.wchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;
  border-radius:5px;padding:3px 8px;font-family:var(--mono);line-height:1.3}
.wchip.warn{color:var(--amber);background:rgba(240,162,75,.1);border:1px solid #4a3b22}
.wchip.err{color:var(--rose);background:rgba(245,106,122,.08);border:1px solid #48272d}
.wchip.ok{color:var(--good);background:rgba(70,211,154,.08);border:1px solid #1f4838}
.lint-flag{margin-left:6px;font-size:13px;line-height:1}

/* balance lab */
.bl{border:1px solid var(--line);border-radius:9px;background:var(--bg-2);padding:14px 16px}
.bl .blrow{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-end;margin-bottom:12px}
.bl .blfield{display:flex;flex-direction:column;gap:4px}
.bl .blfield label{font-size:10px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.bl .blfield input,.bl .blfield select{height:30px;width:130px}
.dmgbig{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--accent);line-height:1}
.dmgsub{font-size:11px;color:var(--ink-3);font-family:var(--mono)}
.dmgtable{width:100%;font-size:11.5px;margin-top:4px}
.dmgtable td{padding:4px 8px;border-bottom:1px solid #161e23}
.dmgtable .nm{color:var(--ink-2);font-weight:600}
.dmgtable .dm{font-family:var(--mono);color:var(--accent);text-align:right}
.dmgtable .mt{font-family:var(--mono);color:var(--ink-3);text-align:right}

/* usages */
.usages{display:flex;flex-wrap:wrap;gap:6px}
.usage-chip{font-size:11px;border:1px solid var(--line-2);background:var(--panel);
  border-radius:5px;padding:4px 9px;color:var(--ink-2);cursor:pointer;font-family:var(--mono)}
.usage-chip:hover{border-color:var(--accent-2);color:var(--accent)}
.usage-chip .ut{color:var(--ink-3);margin-right:5px}

/* AoE thumb + matrix */
.aoe-thumb{width:46px;height:46px;border:1px solid var(--line-2);border-radius:6px;flex:none;
  background:var(--panel);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.aoe-thumb img{width:100%;height:100%;object-fit:contain;display:block}
.aoe-thumb .ph{font-size:7px;font-family:var(--mono);color:var(--ink-3);text-align:center;line-height:1.15;padding:2px;letter-spacing:.2px}
.aoe-mtx{display:grid;gap:8px;margin-top:6px}
.aoe-cell{border:1px solid var(--line);border-radius:7px;background:var(--panel);padding:6px;text-align:center}
.aoe-cell .frame{width:100%;aspect-ratio:1;border:1px solid var(--line);border-radius:5px;background:var(--bg-2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:5px}
.aoe-cell .frame img{width:100%;height:100%;object-fit:contain}
.aoe-cell .frame .ph{font-size:8px;font-family:var(--mono);color:var(--ink-3);text-align:center;padding:4px;line-height:1.2}
.aoe-cell .lbl{font-size:10px;font-family:var(--mono);color:var(--ink-2)}

/* collapsible slot card (Characters / Classes action slots) */
.slotcard{border:1px solid var(--line);border-radius:8px;background:var(--panel);margin-bottom:8px;overflow:hidden}
.slotcard.filled{border-color:var(--line-2);background:var(--panel-2)}
.slotcard .sc-head{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;user-select:none}
.slotcard .sc-head:hover{background:#16202680}
.slotcard .sc-slot{font-family:var(--mono);font-size:10px;color:var(--ink-3);min-width:130px;text-transform:uppercase;letter-spacing:.4px}
.slotcard.filled .sc-slot{color:var(--accent)}
.slotcard .sc-name{flex:1;font-weight:600;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slotcard .sc-name .unknown{color:var(--rose)}
.slotcard .sc-meta{font-size:10px;font-family:var(--mono);color:var(--ink-3);white-space:nowrap}
.slotcard .sc-caret{color:var(--ink-3);font-size:11px;width:14px;text-align:center}
.slotcard .sc-body{padding:4px 12px 14px;border-top:1px solid var(--line)}

/* matrix dropdown (effect + aoe pattern pickers) */
.mdd{position:relative}
.mdd .mdd-btn{width:100%;height:32px;padding:0 26px 0 9px;border-radius:6px;background:var(--panel);
  border:1px solid var(--line-2);color:var(--ink);font-size:12px;text-align:left;cursor:pointer;
  display:flex;align-items:center;position:relative;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mdd .mdd-btn:after{content:"";position:absolute;right:10px;top:13px;width:0;height:0;
  border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--ink-3)}
.mdd .mdd-btn.placeholder{color:var(--ink-3)}
.mdd-pop{position:absolute;z-index:60;top:35px;left:0;min-width:max(100%,300px);max-height:340px;overflow:auto;
  background:var(--panel-2);border:1px solid var(--line-2);border-radius:8px;box-shadow:0 16px 44px rgba(0,0,0,.55);padding:6px}
.mdd-search{width:100%;height:30px;margin-bottom:6px}
.mdd-grp{margin-bottom:8px}
.mdd-grp-h{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);
  padding:3px 6px;display:flex;align-items:center;gap:6px}
.mdd-grp-h:after{content:"";flex:1;height:1px;background:var(--line)}
.mdd-opts{display:flex;flex-wrap:wrap;gap:4px;padding:2px}
.mdd-opt{font-size:11px;border:1px solid var(--line-2);background:var(--panel);border-radius:5px;
  padding:4px 9px;cursor:pointer;color:var(--ink-2);font-family:var(--mono)}
.mdd-opt:hover{border-color:var(--accent-2);color:var(--accent)}
.mdd-opt.sel{background:var(--accent-dim);border-color:var(--accent-2);color:var(--accent)}
.mdd-clear{font-size:10px;color:var(--ink-3);cursor:pointer;padding:2px 6px}
.mdd-clear:hover{color:var(--rose)}

/* class multi-select */
.classgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px}
.classtoggle{font-size:11px;border:1px solid var(--line-2);background:var(--panel);border-radius:5px;
  padding:5px 8px;cursor:pointer;color:var(--ink-3);text-align:center;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.classtoggle:hover{color:var(--ink-2);border-color:#384850}
.classtoggle.on{background:var(--accent-dim);border-color:var(--accent-2);color:var(--accent)}

/* class-progression buckets (drag & drop) */
.bucketwrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bucket{border:1px solid var(--line-2);border-radius:8px;background:var(--bg-2);min-height:88px;display:flex;flex-direction:column;
  border-top:3px solid var(--bk-accent,#566)}
.bucket.over{box-shadow:0 0 0 2px var(--accent-2) inset;background:var(--panel)}
.bk-head{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-bottom:1px solid var(--line);
  font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--bk-accent,var(--ink-2))}
.bk-n{font-family:var(--mono);color:var(--ink-3);font-weight:600}
.bk-body{display:flex;flex-wrap:wrap;gap:4px;padding:7px;align-content:flex-start;flex:1}
.bk-empty{color:var(--ink-3);font-size:10.5px;font-style:italic;opacity:.6;align-self:center;margin:auto}
.chip{font-size:11px;font-weight:700;color:#f4f7f9;text-shadow:0 1px 2px rgba(0,0,0,.75);
  background:var(--panel);border:1px solid rgba(0,0,0,.4);
  border-radius:5px;padding:3px 7px;cursor:grab;user-select:none;white-space:nowrap}
.chip:hover{outline:2px solid var(--accent-2);outline-offset:0}
.chip.dragging{opacity:.4}
.chip.primary{border:2px solid #ffe08a;box-shadow:0 0 0 1px rgba(0,0,0,.45)}
.primary-star{color:#ffe08a;margin-right:3px;text-shadow:0 1px 2px rgba(0,0,0,.85)}
/* playstyle legend + class-editor swatches */
.ps-legend{display:flex;flex-wrap:wrap;gap:4px 10px;margin:2px 0 10px}
.ps-leg{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--ink-3);font-weight:700;letter-spacing:.02em}
.ps-leg .sw{width:11px;height:11px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.45)}
.ps-pick{display:flex;align-items:center;gap:8px}
.ps-swatch{width:20px;height:20px;border-radius:5px;flex:none;border:1px solid rgba(0,0,0,.45)}
.bk-starting{--bk-accent:#e9c54a}
.bk-trivial{--bk-accent:#5fb98a}
.bk-easy{--bk-accent:#54c2a8}
.bk-medium{--bk-accent:#46a0d8}
.bk-hard{--bk-accent:#caa14a}
.bk-veryhard{--bk-accent:#d98a4a}
.bk-brutal{--bk-accent:#d8634a}
.bk-locked{--bk-accent:#7a6473}
@media (max-width:760px){ .bucketwrap{grid-template-columns:repeat(2,1fr)} .chip{padding:6px 9px;font-size:13px} }

/* command palette */
.cmdk-scrim{position:fixed;inset:0;background:rgba(4,7,9,.55);backdrop-filter:blur(2px);z-index:300;
  display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
.cmdk{width:min(620px,94vw);background:var(--panel);border:1px solid var(--line-2);border-radius:12px;
  box-shadow:0 30px 90px rgba(0,0,0,.6);overflow:hidden}
.cmdk-in{width:100%;height:48px;border:none;border-bottom:1px solid var(--line);background:transparent;
  color:var(--ink);font-size:16px;padding:0 16px;border-radius:0}
.cmdk-in:focus{box-shadow:none}
.cmdk-list{max-height:50vh;overflow:auto;padding:6px}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer}
.cmdk-item.active{background:rgba(40,224,200,.1)}
.cmdk-item .ki{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--accent-dim);color:var(--accent)}
.cmdk-item .kn{flex:1;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-item .kid{font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
.cmdk-empty{padding:18px;text-align:center;color:var(--ink-3);font-size:12px}

/* bulk bar */
.bulkbar{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 12px;background:#13201f;border-bottom:1px solid var(--accent-dim)}
.bulkbar .bb-count{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700}
.cb{width:15px;height:15px;border:1px solid var(--line-2);border-radius:3px;background:var(--panel);
  flex:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent)}
.cb.on{background:var(--accent-dim);border-color:var(--accent-2)}

.login-wrap{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:rgba(8,9,12,.93)}
.login-card{width:340px;max-width:90vw;background:#1d2027;border:1px solid #313742;border-radius:12px;
  padding:24px;display:grid;gap:12px;box-shadow:0 16px 48px rgba(0,0,0,.55)}
.login-card input{height:42px}

/* ════════════════════════════════════════════════════════════════════
   ROUND-2 ADDITIONS (2026-06-17)
   ════════════════════════════════════════════════════════════════════ */
/* R2.1 — collapsed slot row: HALVE height, MAXIMIZE inner font, one line */
.slotcard .sc-head{padding:3px 9px;min-height:30px}
.slotcard .sc-head .aoe-thumb{width:28px;height:28px}
.slotcard .sc-slot{font-size:10.5px;min-width:104px}
.slotcard .sc-name{font-size:14px;font-weight:700}
.slotcard .sc-meta{font-size:11px;color:var(--ink-2)}
.slotcard .sc-caret{font-size:12px}

/* R2.2 — expanded action: SQUEEZE — much denser, kill the big gaps */
.slotcard .sc-body{padding:6px 10px 9px}
.slotcard .sc-body fieldset.group{margin:0 0 9px}
.slotcard .sc-body .group-title{margin-bottom:5px}
.slotcard .sc-body .grid{gap:7px 11px}
.slotcard .sc-body .subgroup{padding:8px 9px}
.slotcard .sc-body .subgroup .sg-head{margin-bottom:6px}
.slotcard .sc-body .note{margin-top:2px}
.dense-action fieldset.group{margin:0 0 10px}
.dense-action .group-title{margin-bottom:6px}
.dense-action .grid{gap:8px 12px}
.dense-action .subgroup{padding:9px}
.dense-action .subgroup .sg-head{margin-bottom:6px}

/* ════════════════════════════════════════════════════════════════════
   R4 (2026-06-17) — expanded action editor density: kill the dead space.
   Applies wherever ActionEditorInline renders (Characters/Classes/Types
   .dense-action wrappers, SlotCard .sc-body, AND the bare Actions tab),
   so the rules target the component's own classes (not a wrapper).
   ════════════════════════════════════════════════════════════════════ */
/* DAMAGE & AOE — pack the 7 fields in a tight wrapping, left-aligned flow
   instead of fixed 4-then-3 columns that stretch + leave gaps. */
.daoe-grid{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:flex-end}
.daoe-grid .field{flex:0 1 auto;min-width:0}
/* content-size each field by role (order matches the JSX):
   1 Damage type · 2 Damage modifier · 3 Energy cost · 4 Trap tick
   5 AoE pattern · 6 AoE size · 7 AoE range */
.daoe-grid .field:nth-child(1){flex-basis:160px}
.daoe-grid .field:nth-child(2){flex-basis:120px}
.daoe-grid .field:nth-child(3){flex-basis:90px}
.daoe-grid .field:nth-child(4){flex-basis:150px}
.daoe-grid .field:nth-child(5){flex-basis:188px}
.daoe-grid .field:nth-child(6){flex-basis:90px}
.daoe-grid .field:nth-child(7){flex-basis:90px}
/* controls fill their now-narrow field, not a wide grid cell */
.daoe-grid .field>select,
.daoe-grid .field>.mdd,
.daoe-grid .field>.mdd .mdd-btn{width:100%;max-width:100%}

/* validation row — thumbnail + chip inline & compact; no big empty box */
.daoe-valid{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:10px}
.daoe-valid .chips{margin:0;flex:0 1 auto}

/* EFFECTS — keep the two blocks side-by-side but tighten them */
.effects-grid{gap:10px 12px}
/* header: toggle sits right after the title (no space-between gap).
   .sg-head is used ONLY by EffectBlock (always holds the Active toggle),
   so this is safe without a :has() guard — works on older browsers too. */
.subgroup .sg-head{justify-content:flex-start;gap:12px}
.subgroup .sg-head h4{flex:0 0 auto}
/* Effect / Magnitude / Duration — content-sized, left-aligned, wrapping */
.eff-fields{display:flex;flex-wrap:wrap;grid-template-columns:none;gap:8px 12px;align-items:flex-end}
.eff-fields .field{flex:0 1 auto;min-width:0}
.eff-fields .field:nth-child(1){flex-basis:160px}   /* Effect */
.eff-fields .field:nth-child(2){flex-basis:96px}     /* Magnitude */
.eff-fields .field:nth-child(3){flex-basis:96px}     /* Duration */
.eff-fields .field>select,
.eff-fields .field>.mdd,
.eff-fields .field>.mdd .mdd-btn{width:100%;max-width:100%}

/* SUMMON — narrow the select; don't reserve a full-width empty cell */
.summon-row{display:flex;flex-wrap:wrap;gap:8px 12px}
.summon-row .field{flex:0 1 auto;min-width:0;max-width:240px}
.summon-row .field>select{width:100%;max-width:240px}

/* R2.3 — matrix dropdown not clipped + WIDER so each group fits one line */
.slotcard,.slotcard .sc-body,.rep-item,.bl,fieldset.group{overflow:visible}
.mdd-pop{min-width:max(100%,560px);max-height:420px;z-index:120}
.mdd-pop.up{top:auto;bottom:35px}
.mdd-grp-h{font-size:10px;letter-spacing:.5px}
.mdd-opts{gap:5px}
.mdd-opt{font-size:11.5px;padding:4px 10px;white-space:nowrap}
/* keep dropdown groups single-line: don't wrap within a group row */
.mdd-grp .mdd-opts{flex-wrap:nowrap;overflow-x:auto}

/* R2.5 — shared-action badge + fork button */
.share-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 9px;
  padding:6px 9px;border:1px solid #4a3b22;border-radius:7px;background:rgba(240,162,75,.06)}
.share-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
  color:var(--amber);font-family:var(--mono)}
.share-badge.solo{color:var(--ink-3);border-color:var(--line);background:transparent}
.share-bar.solo{border-color:var(--line);background:var(--bg-2)}
.fork-btn{height:26px;padding:0 11px;border-radius:6px;border:1px solid var(--line-2);
  background:var(--panel-2);color:var(--ink-2);font-size:11px;font-weight:600;cursor:pointer}
.fork-btn:hover{border-color:var(--accent-2);color:var(--accent)}
.slug-chip{font-family:var(--mono);font-size:10px;color:var(--ink-3);background:var(--panel);
  border:1px solid var(--line);border-radius:4px;padding:1px 6px}

/* R2.6 — wide stat matrix dropdown (reuse .mdd but allow a 2-col grid of chips) */
.mdd-pop.stat{min-width:max(100%,420px)}
.mdd-pop.modmtx{min-width:max(100%,440px)}

/* R2.9 — left-row tier letter + dual type/percent line */
.tier-letter{font-family:var(--mono);font-size:11px;font-weight:800;width:20px;height:20px;
  border-radius:4px;display:inline-flex;align-items:center;justify-content:center;flex:none}
.tier-letter.tier-hero{color:var(--hero);background:rgba(240,162,75,.16)}
.tier-letter.tier-lieutenant{color:var(--lieutenant);background:rgba(95,176,255,.16)}
.tier-letter.tier-minion{color:var(--minion);background:rgba(139,151,160,.16)}
.row .rtypes{font-size:10px;color:var(--ink-3);font-family:var(--mono);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:160px}
.row-two{flex-direction:column;align-items:stretch;gap:2px;padding:7px 14px}
.row-two .rt-top{display:flex;align-items:center;gap:9px}
.row-two .rt-bot{display:flex;align-items:center;gap:8px;padding-left:29px}

/* R2.10 — full character table view */
.char-table-wrap{overflow:auto;flex:1;min-height:0}
table.chartable{font-size:11.5px}
table.chartable thead th{padding:7px 9px;font-size:9.5px;cursor:pointer;user-select:none}
table.chartable thead th:hover{color:var(--accent)}
table.chartable tbody td{padding:4px 9px;font-family:var(--mono);font-size:11px;color:var(--ink-2);text-align:right;white-space:nowrap}
table.chartable tbody td.cname{text-align:left;font-family:var(--sans);color:var(--ink);font-weight:600;cursor:pointer}
table.chartable tbody td.cname:hover{color:var(--accent)}
table.chartable tbody tr.sel{background:rgba(40,224,200,.07)}
.expand-toggle{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  color:var(--ink-3);cursor:pointer;border:1px solid var(--line-2);background:var(--panel);
  border-radius:6px;padding:4px 9px;user-select:none}
.expand-toggle:hover{color:var(--ink-2);border-color:#384850}
.expand-toggle.on{color:var(--accent);border-color:var(--accent-2);background:var(--accent-dim)}

/* R2.11 — class → characters cross-link chips */
.classchars{display:flex;flex-wrap:wrap;gap:6px}
.cc-chip{font-size:11px;border:1px solid var(--line-2);background:var(--panel);border-radius:5px;
  padding:3px 9px;color:var(--ink-2);cursor:pointer;font-family:var(--mono);display:inline-flex;align-items:center;gap:5px}
.cc-chip:hover{border-color:var(--accent-2);color:var(--accent)}
.cc-chip .ccx{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;
  padding:1px 5px;border-radius:3px;background:var(--accent-dim);color:var(--accent)}
.cc-chip .ccx.unlock{background:rgba(155,140,240,.14);color:var(--violet)}

/* R2.13 — condensed effect reference cards (½ box, keep font) */
.ref-grid.tight{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.ref-card.tight{padding:8px 10px}
.ref-card.tight::before{width:2px}
.ref-card.tight h3{font-size:13px;margin:0 0 1px;display:inline-block}
.ref-card.tight .cat{display:inline-block;margin:0 0 0 8px;font-size:9px}
.ref-card.tight dl{grid-template-columns:1fr;gap:2px 0;margin-top:4px;font-size:11.5px}
.ref-card.tight dt{display:none}
.ref-card.tight dd{color:var(--ink-2);line-height:1.35}
.ref-card.tight dd .dlbl{color:var(--ink-3);font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.4px;margin-right:5px}
.ref-card.tight em{font-style:normal;font-weight:700;color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent-2)}
.ref-card.tight b{font-weight:700;color:var(--accent)}

/* R2.14 — type-matrix crosshair (row + column highlight on hover) */
.tm-grid tbody tr.tm-rowhi{background:rgba(40,224,200,.045)}
.tm-grid td.tm-colhi,.tm-grid th.tm-colhi{background:rgba(40,224,200,.06)!important}
.tm-grid td.tm-cellhi .tm-cell{border-color:var(--accent-2)}

/* R2.15 — AoE expanded images at ~half size */
.aoe-mtx.half .aoe-cell{padding:4px}
.aoe-mtx.half .aoe-cell .frame{max-width:62px;margin-left:auto;margin-right:auto}

/* ════════════════════════════════════════════════════════════════════
   ROUND-3 ADDITIONS (2026-06-17)
   ════════════════════════════════════════════════════════════════════ */
/* R3.1 — left list rows: ONE condensed line (id · tier letter · name · types) */
.row.row-one{align-items:center;gap:8px;padding:7px 12px}
.row.row-one .rid{min-width:26px;text-align:right;font-size:10.5px;color:var(--ink-3);flex:none}
.row.row-one .tier-letter{width:18px;height:18px;font-size:10.5px}
.row.row-one .rname{flex:1;min-width:0}
.row.row-one .rtypes{flex:none;max-width:170px}

/* R3.7 — action slots in a 2-COLUMN grid; expanded card spans full width.
   The grid owns the gap, so cards drop their own bottom margin inside it. */
.slotgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
.slotgrid>.slotcard{margin-bottom:0;min-width:0}                       /* allow grid item to shrink */
.slotgrid>.slotcard.expanded{grid-column:1 / -1}
/* collapsed (not expanded) cards live in a half-width column: keep the head
   on ONE tight line — let the meta shrink + ellipsis instead of spilling. */
.slotgrid>.slotcard:not(.expanded) .sc-head{overflow:hidden}
.slotgrid>.slotcard:not(.expanded) .sc-slot{min-width:0;flex:0 0 auto;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slotgrid>.slotcard:not(.expanded) .sc-meta{overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto}
.slotgrid>.slotcard:not(.expanded) .sc-name{flex:1 1 auto;min-width:40px}
@media (max-width:760px){ .slotgrid{grid-template-columns:1fr} }

/* R3.2 — stat row: matrix dropdown + tiny +/- steppers */
.statrow{display:flex;align-items:stretch;gap:4px}
.statrow .mdd{flex:1;min-width:0}
.stat-step{width:24px;flex:none;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink-2);
  border-radius:6px;cursor:pointer;font-size:14px;line-height:1;padding:0;font-weight:700}
.stat-step:hover{border-color:var(--accent-2);color:var(--accent)}
.stat-step:active{transform:translateY(1px)}

/* base: mobile-only chrome is hidden on desktop (shown in the media query) */
.mobile-backbar{display:none}
.save-fab{display:none}

/* ════════════════════════════════════════════════════════════════════
   MOBILE / RESPONSIVE PASS (2026-06-17) — tablet ≤760, phone ≤480.
   Master/detail: on mobile show the list OR the detail (toggled by the
   `mobile-detail` body class set in App), never both stacked. Inputs use
   16px font so iOS doesn't auto-zoom on focus; controls get 44px taps.
   Desktop is untouched (everything here is media-scoped or hidden above).
   ════════════════════════════════════════════════════════════════════ */
@media (max-width:760px){
  body{font-size:14px}

  /* —— top chrome —— */
  .topbar{position:static;height:auto;flex-wrap:wrap;gap:8px;padding:8px 10px}
  .topbar .spacer{display:none}
  .brand h1,.brand .sub{display:none}
  .cmdk-btn{display:none}                       /* no keyboard shortcut on mobile */
  .topbar .btn{height:40px}
  .topbar .btn.ghost{padding:0 12px;font-size:16px}
  .topbar .btn.primary{margin-left:auto}        /* keep Save at the right edge */

  /* tabbar: sticky primary nav, horizontal scroll, bigger taps */
  .tabbar{position:sticky;top:0;z-index:40;height:auto;overflow-x:auto;
    white-space:nowrap;padding:0 6px;-webkit-overflow-scrolling:touch}
  .tab{flex:none;padding:12px 14px;font-size:13.5px}

  /* back-bar takes the tabbar's place while inside a record */
  body.mobile-detail .tabbar{display:none}
  .mobile-backbar{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:42;
    padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--line-2)}
  .mobile-backbar .mb-back{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 14px;
    border:1px solid var(--line-2);border-radius:9px;background:var(--panel-2);color:var(--accent);
    font-size:14.5px;font-weight:700;cursor:pointer;flex:none}
  .mobile-backbar .mb-id{font-family:var(--mono);font-size:12px;color:var(--ink-3);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* —— master/detail layout —— */
  .view{height:auto;min-height:50vh}
  .split,.split.wide{grid-template-columns:1fr;height:auto}
  .list-pane{border-right:none;min-height:0}
  .list-head{position:static}
  .list-scroll{overflow:visible}
  .detail-pane{overflow:visible}
  .detail-head{position:static;padding:12px 14px}
  body:not(.mobile-detail) .split .detail-pane{display:none}
  body.mobile-detail .split .list-pane{display:none}

  /* roomier list rows */
  .row{padding:12px 14px}
  .row.row-one{padding:11px 12px}

  /* —— forms —— */
  .detail-body{padding:14px 14px 96px;max-width:none}
  .full-pane{padding:14px 14px 96px}
  .group{margin-bottom:18px}
  .grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{grid-template-columns:1fr 1fr}

  /* tap targets + STOP iOS focus-zoom (needs ≥16px font on the control) */
  input[type=text],input[type=number],select,textarea{height:44px;font-size:16px}
  textarea{height:auto;min-height:80px}
  .btn{height:40px;font-size:14px}
  .toggle{padding:11px 14px;font-size:14px}
  .pill{padding:7px 13px;font-size:13px}
  .add-row{padding:10px 14px;font-size:13px}
  .mini{width:34px;height:34px;font-size:15px}
  .stat-step{width:36px;font-size:18px}
  .rep-del{width:40px;height:44px}

  /* slot rows + collapsible slot cards */
  .slot{grid-template-columns:1fr 1fr;gap:8px}
  .slot select,.slot input{height:40px;font-size:15px}
  .slotgrid{grid-template-columns:1fr}
  /* collapsed slot card → TWO lines: name (≥12 chars) + buttons on line 1;
     full meta (×mod · pattern · Size · Range · effect1 · effect2) wraps on line 2 */
  .slotcard .sc-head{min-height:44px;padding:6px 10px;flex-wrap:wrap;align-items:center;row-gap:2px}
  .slotcard .sc-headmain{flex-wrap:wrap;align-items:center;row-gap:2px}
  .slotcard .sc-slot{min-width:0;max-width:84px;flex:0 0 auto;font-size:9.5px}
  .slotcard .sc-name{flex:1 1 auto;min-width:12ch;font-size:14.5px}
  .slotcard .sc-meta{flex:1 1 100%;order:9;white-space:normal;line-height:1.35;font-size:11px;color:var(--ink-2)}
  /* un-clamp the 2-col character slots' collapsed meta so it wraps too */
  .slotgrid>.slotcard:not(.expanded) .sc-head{overflow:visible}
  .slotgrid>.slotcard:not(.expanded) .sc-name{min-width:12ch;overflow:hidden;text-overflow:ellipsis}
  .slotgrid>.slotcard:not(.expanded) .sc-meta{overflow:visible;flex:1 1 100%;min-width:0}

  /* matrix dropdown → bottom sheet (full-width, anchored to viewport bottom) */
  .mdd .mdd-btn{height:44px;font-size:15px;padding-right:28px}
  .mdd .mdd-btn:after{top:19px}
  .mdd-pop,.mdd-pop.stat,.mdd-pop.modmtx{position:fixed;left:0;right:0;bottom:0;top:auto;
    min-width:0;width:100%;max-height:62vh;border-radius:14px 14px 0 0;z-index:130;
    box-shadow:0 -16px 50px rgba(0,0,0,.6)}
  .mdd-pop.up{top:auto;bottom:0}
  .mdd-grp .mdd-opts{flex-wrap:wrap;overflow-x:visible}
  .mdd-opt{font-size:13px;padding:7px 12px}
  .mdd-search{height:42px;font-size:16px}

  /* tables: touch sizing (the wrappers already scroll-x) */
  table input{height:38px;font-size:15px}
  .tm-cell{width:48px;height:38px;font-size:13px}
  table.chartable tbody td{padding:8px 9px}
  table.chartable thead th{padding:9px 9px}

  /* balance lab — full-width controls */
  .bl .blfield{flex:1 1 130px}
  .bl .blfield input,.bl .blfield select{width:100%}

  /* card-art block stacks */
  .art-block{flex-direction:column}
  .art-frame{margin:0 auto}

  /* toasts span the width + sit above the Save FAB */
  .toast-wrap{left:12px;right:12px;bottom:74px;align-items:stretch}
  .toast{min-width:0;max-width:none}

  /* floating Save (the topbar Save scrolls away) */
  .save-fab{display:inline-flex;position:fixed;right:14px;bottom:14px;z-index:120;cursor:pointer;
    align-items:center;gap:8px;height:50px;padding:0 20px;border-radius:99px;border:none;
    background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#04201d;font-weight:800;font-size:15px;
    box-shadow:0 12px 32px rgba(0,0,0,.5)}
  .save-fab .count{font-family:var(--mono);background:rgba(4,32,29,.35);padding:1px 8px;border-radius:99px;font-size:13px}
}

/* phones: collapse multi-column forms to one column */
@media (max-width:480px){
  .grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{grid-template-columns:1fr}
  .slot{grid-template-columns:1fr}
  .detail-head .title{font-size:16px}
}

/* ════════════════════════════════════════════════════════════════════
   R5 (2026-07-02) — MULTI-MOVE CARD GRID
   Auto-fit grid of always-open action cards + the per-field visibility
   chip bar. Used by the Class (Core/Mastery), Character, and Actions tabs
   so 3-4+ moves' full data show at once and reflow to 1 column on phone.
   ════════════════════════════════════════════════════════════════════ */
/* field-visibility chip bar */
.fieldchips{display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  padding:8px 11px;margin:0 0 12px;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--panel)}
.fieldchips .fc-lead{font-size:9.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;
  color:var(--ink-3);margin-right:4px}
.fc-chip{border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink-3);
  border-radius:99px;padding:3px 10px;font-size:10.5px;font-weight:600;cursor:pointer;
  font-family:var(--mono);letter-spacing:.2px}
.fc-chip:hover{color:var(--ink-2);border-color:#384850}
.fc-chip.on{background:var(--accent-dim);border-color:var(--accent-2);color:var(--accent)}
.fc-sep{flex:1;min-width:8px}
.fc-mini{border:1px solid var(--line-2);background:transparent;color:var(--ink-3);
  border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;
  font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.fc-mini:hover{color:var(--accent);border-color:var(--accent-2)}

/* auto-fit card grid: as many columns as fit a ~320px min width (recipe 2026-07-02) */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));
  gap:8px;align-items:start}
.cardgrid>.slotcard{margin-bottom:0;min-width:0}
/* an OPEN card keeps its OWN column here (unlike .slotgrid, which spans full width) */
.cardgrid>.slotcard.expanded{grid-column:auto}
/* effects stack in the narrow column instead of the 2-up default */
.cardgrid .effects-grid{grid-template-columns:1fr}
/* identity Action/Cooldown/Category row: 2-up (then 1-up on phone) inside a card */
.cardgrid .sc-body>.grid.cols-3{grid-template-columns:1fr 1fr}
/* mastery level badge on the card head */
.lv-badge{font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.4px;
  color:var(--violet);background:rgba(155,140,240,.14);border:1px solid rgba(155,140,240,.3);
  border-radius:5px;padding:1px 6px;flex:none}

@media (max-width:760px){
  .cardgrid{grid-template-columns:1fr;gap:10px}
  .cardgrid .sc-body>.grid.cols-3{grid-template-columns:1fr}
  .fieldchips{position:static}
  .fc-chip{padding:6px 11px;font-size:12px}   /* bigger taps on phone */
  .fc-mini{padding:6px 11px;font-size:11px}
}

/* ════════════════════════════════════════════════════════════════════
   R5b (2026-07-02) — DENSITY PASS. The first grid pass left cards too tall
   with dead space: long inline field hints wrap into tall columns and, with
   the row bottom-aligned, push empty gaps above the short fields. Fix =
   drop the hints (kept in the wide Actions detail), top-align, tighten the
   vertical rhythm, uniform-size the AoE fields (robust to toggled-off ones),
   and compact the effect blocks. Also let the grid tabs use more width so
   the auto-fit grid actually gets its 3rd/4th column.
   ════════════════════════════════════════════════════════════════════ */
.detail-body.wide-cards{max-width:1500px}
/* R5c — collapsible left list (Character tab): reclaim the ~380px for the cards */
.list-toggle{height:28px;padding:0 12px;border-radius:6px;border:1px solid var(--line-2);
  background:var(--panel-2);color:var(--ink-2);font-size:11.5px;font-weight:600;cursor:pointer;flex:none}
.list-toggle:hover{border-color:var(--accent-2);color:var(--accent)}
@media (min-width:761px){
  .split.no-list{grid-template-columns:1fr}
  .split.no-list>.list-pane{display:none}
}
/* hints wrap tall in a narrow card → hide inside the grid (hover the control) */
.cardgrid .field>label .hint{display:none}
/* short fields must not sink to the bottom of a taller neighbour */
.cardgrid .eff-fields{align-items:start}
/* Damage & AoE = a fixed 4-per-row grid (recipe 2026-07-02); 2 per row on phone.
   Order-independent — a hidden field just leaves the grid, no gaps. */
.cardgrid .daoe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px 8px;align-items:start}
.cardgrid .daoe-grid .field{flex:none;min-width:0}
/* compact vertical rhythm */
.cardgrid .sc-body{padding:6px 8px 7px}
.cardgrid .sc-body fieldset.group,.cardgrid .dense-action fieldset.group{margin:0 0 6px}
.cardgrid .group-title{margin-bottom:4px}
.cardgrid .daoe-valid{margin-top:5px}
.cardgrid .field{gap:2px}
.cardgrid .field>label{font-size:9.5px}
/* desktop only: trim control height (mobile keeps 44px taps) */
@media (min-width:761px){
  .cardgrid select,.cardgrid .mdd .mdd-btn,
  .cardgrid input[type=number],.cardgrid input[type=text]{height:28px}
}
@media (max-width:760px){
  .cardgrid .daoe-grid{grid-template-columns:repeat(2,1fr)}
}
/* effects: compact + drop the long helper line AND the empty-slot placeholder
   (the effect's meaning is still on the dropdown's hover title) */
.cardgrid .subgroup{padding:7px 8px}
.cardgrid .subgroup .sg-head{margin-bottom:5px}
.cardgrid .subgroup>.note{display:none}
.cardgrid .subgroup.off{opacity:.55}
.cardgrid .eff-fields{gap:6px 10px}
.cardgrid .eff-fields .field{flex:1 1 84px;min-width:76px}
/* the character slot's Action/Cooldown/Category row: tighter */
.cardgrid .sc-body>.grid.cols-3{gap:6px 10px;margin-bottom:6px}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { h, render, Component } from "https://esm.sh/preact@10.23.2";
import { useState, useEffect, useMemo, useRef, useCallback } from "https://esm.sh/preact@10.23.2/hooks";
import htm from "https://esm.sh/htm@3.1.1";
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const html = htm.bind(h);

/* ════════════════════════════════════════════════════════════════════
   CONSTANTS / DATA LAYER  (mirrors index.html Supabase block)
   ════════════════════════════════════════════════════════════════════ */
const SB_URL = "https://tnmdusfxtzgfiehclxcv.supabase.co";
const SB_KEY = "sb_publishable_S4wKvpWCvkj-4Bres2UZvg_1SAtb8gV"; // publishable (public by design; RLS gates writes)
const db = createClient(SB_URL, SB_KEY);
const TABLES = ["characters","actions","classes","effects","types","aoe_patterns","type_matrix"];

const PLAYSTYLES = ["VERSATILE","BRAWLER","MARKSMAN","TANK","HEALER","AMPLIFIER","CORRUPTOR",
  "CONTROLLER","STEALTH","SUMMONER","DUELIST","RECKLESS","OUTLIER"];
// distinct fill color per playstyle (used to tint draggable class chips)
const PLAYSTYLE_COLORS = {
  VERSATILE:"#9aa7b0", BRAWLER:"#d8634a", MARKSMAN:"#caa14a", TANK:"#4f7fb8",
  HEALER:"#5fb98a", AMPLIFIER:"#e9c54a", CORRUPTOR:"#8a5bd0", CONTROLLER:"#46a0d8",
  STEALTH:"#7a6473", SUMMONER:"#54c2a8", DUELIST:"#d98a4a", RECKLESS:"#d44a4a",
  OUTLIER:"#c45ba0",
};
const playstyleColor = (ps)=> PLAYSTYLE_COLORS[ps] || "#3a464d";

const STAT_FIELDS = ["health","regen","attack","defense","special_attack","special_defense","speed","dodge","crit_chance","crit_bonus"];
const INT_STATS = ["health","regen","attack","defense","special_attack","special_defense","speed"];
const SYNERGY_STATS = ["Attack","Defense","Special Attack","Special Defense","Dodge","Crit Chance","Crit Bonus","Health","Regen","Speed"];
const CHAR_SLOTS = ["standard_attack","type_attack","class_action"].concat(Array.from({length:15},(_,i)=>"unique_action_"+(i+1)));
/* R3.3 — slots EDITABLE in the Characters tab: drop type_attack + class_action
   (those are inherited from the character's Type / Class now). standard_attack +
   the 15 unique slots remain. CHAR_SLOTS stays full for the usage index. */
const CHAR_EDIT_SLOTS = CHAR_SLOTS.filter(s=>s!=="type_attack"&&s!=="class_action");
const ACTION_CATS = ["","anchor","standard","core","mastery"];
const DAMAGE_TYPES = [{value:0,label:"Normal"},{value:1,label:"Special"},{value:2,label:"Hybrid"}];
// trap_tick: 0=Trigger(Trap), 1=Zone, 2=No(None default) — confirmed via ActionData.gd
const TRAP_TICKS = [{value:2,label:"None"},{value:0,label:"Trap"},{value:1,label:"Zone"}];

/* ──────────────────────────────────────────────────────────────────
   R5 (2026-07-02) — MULTI-MOVE CARD GRID: per-field visibility store.
   One global, localStorage-persisted Set of visible field keys, shared
   by every action card everywhere (Class / Character / Actions / Types).
   The FieldChips bar toggles entries; useFieldVis() re-renders subscribers.
   ────────────────────────────────────────────────────────────────── */
const FIELD_KEYS = [
  {k:"name",         label:"Name"},
  {k:"aoe_thumb",    label:"Shape"},
  {k:"damage_type",  label:"Dmg type"},
  {k:"damage_modifier",label:"Modifier"},
  {k:"energy_cost",  label:"Energy"},
  {k:"cooldown_rounds",label:"Cooldown"},
  {k:"aoe_pattern",  label:"Pattern"},
  {k:"aoe_size",     label:"Size"},
  {k:"aoe_range",    label:"Range"},
  {k:"effect1",      label:"Effect 1"},
  {k:"effect2",      label:"Effect 2"},
  {k:"summon",       label:"Summon"},
  {k:"trap_tick",    label:"Trap tick"},
  {k:"balance",      label:"Balance"},
  {k:"usage",        label:"Uses"},
];
// Default visible set = the 2026-07-02 recipe (extras summon/balance/usage stay off).
const FIELD_VIS_DEFAULT = ["name","aoe_thumb","damage_type","damage_modifier",
  "energy_cost","cooldown_rounds","trap_tick","aoe_pattern","aoe_size","aoe_range","effect1","effect2"];
const FIELD_VIS_LS_KEY = "phalanx_editor_field_vis_v2";
const _fieldVisListeners = new Set();
function _loadFieldVis(){
  try{ const raw=localStorage.getItem(FIELD_VIS_LS_KEY); if(raw){ const a=JSON.parse(raw); if(Array.isArray(a)) return new Set(a); } }catch(e){}
  return new Set(FIELD_VIS_DEFAULT);
}
let _fieldVis = _loadFieldVis();
function _saveFieldVis(){ try{ localStorage.setItem(FIELD_VIS_LS_KEY, JSON.stringify([..._fieldVis])); }catch(e){} }
function toggleFieldVis(k){ if(_fieldVis.has(k)) _fieldVis.delete(k); else _fieldVis.add(k); _saveFieldVis(); _fieldVisListeners.forEach(f=>f()); }
function setAllFieldVis(on){ _fieldVis = on ? new Set(FIELD_KEYS.map(f=>f.k)) : new Set(["name"]); _saveFieldVis(); _fieldVisListeners.forEach(f=>f()); }
/* Subscribe a component to visibility changes. Returns the live Set. */
function useFieldVis(){
  const [,bump]=useState(0);
  useEffect(()=>{ const f=()=>bump(x=>x+1); _fieldVisListeners.add(f); return ()=>_fieldVisListeners.delete(f); },[]);
  return _fieldVis;
}

/* Effect groups — both the Effects reference tab AND the effect matrix dropdown. */

/* ── R2.6 — character stat dropdown ranges (data-derived) ──
   range builder: [min..max] step, inclusive of max. */
function rng(min,max,step){
  const o=[],dec=(String(step).split(".")[1]||"").length;
  for(let v=min; v<=max+1e-9; v+=step) o.push(+v.toFixed(dec));
  return o;
}

  defense:{opts:rng(0,200,5), float:false},
  special_attack:{opts:rng(0,200,5), float:false},
  special_defense:{opts:rng(0,200,5), float:false},
  speed:{opts:rng(0,120,5), float:false},
  dodge:{opts:rng(0,1,0.05), float:true},
  crit_chance:{opts:rng(0,0.5,0.05), float:true},

  crit_bonus:{opts:rng(0,3,0.1), float:true},

/* chunk a flat option list into rows of N for a matrix-style dropdown */
function chunkRows(arr,per){
  const rows=[];
  for(let i=0;i<arr.length;i+=per){
    const slice=arr.slice(i,i+per);
    rows.push({label:`${slice[0]} – ${slice[slice.length-1]}`, names:slice.map(String)});
  }
  return rows;
}

/* Effect magnitude / duration dropdowns (spec §Shared dropdown rules). */
function magnitudeOptions(effect){
  if(effect==="Root"||effect==="Stun") return [0];
  if(effect==="Bleed"||effect==="Poison"){
    const o=[]; for(let i=1;i<=50;i++) o.push(+(i/10).toFixed(1)); return o; // 0.1 .. 5.0
  }
  const o=[]; for(let i=1;i<=20;i++) o.push(i);
  for(let i=25;i<=100;i+=5) o.push(i);
  return o;
}
function durationOptions(effect){
  const zero = ["Heal","Heal %","Cleanse","Push","Pull"];
  if(zero.includes(effect)) return [0];
  const o=[]; for(let i=1;i<=30;i++) o.push(i); return o;
}

/* stable image path for an exported AoE pattern PNG */
function aoeImgPath(pattern, size, range){
  if(!pattern) return null;
  const base = String(pattern).toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
  if(size==null||range==null) return `./aoe/${base}.png`;
  return `./aoe/${base}_s${size}_r${range}.png`;
}

/* ── enums + indexes derived from loaded data ── */
function buildEnums(data){
  const typesArr = data.types||[];
  const classesArr = (data.classes&&data.classes.classes)||[];
  return {
    types: typesArr.map(t=>t.type_name).filter(Boolean).sort(),
    classes: classesArr.map(c=>c.class_name).filter(Boolean).sort(),
    aoe_patterns: (data.aoe_patterns||[]).map(p=>p.name).filter(Boolean),
    effects: (data.effects||[]).map(e=>e.name).filter(Boolean),
    action_ids: (data.actions||[]).map(a=>a.id).filter(Boolean).sort(),
  };
}

const clone = o => (o==null?o:JSON.parse(JSON.stringify(o)));
const num = (v,f=0)=>{const n=parseFloat(v);return Number.isFinite(n)?n:f;};
const intOf = (v,f=0)=>{const n=parseInt(v,10);return Number.isFinite(n)?n:f;};
const prettyStat = s => String(s||"").replace(/_/g," ").replace(/\b\w/g,m=>m.toUpperCase()).replace("Special","Sp.");
const debounce = (fn,ms=160)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};
function fuzzy(q, s){
  q=(q||"").toLowerCase().trim(); s=(s||"").toLowerCase();
  if(!q) return true;
  let i=0; for(const ch of s){ if(ch===q[i]) i++; if(i>=q.length) return true; } return false;
}
/* R3.4 — build a plain-text hover description for an effect from the catalog
   ({name, magnitude_meaning, duration_meaning, notes}). Used as a `title` tooltip. */
function effectDescText(eff){
  if(!eff) return "";
  const bits=[];
  if(eff.category) bits.push("["+eff.category+"]");
  if(eff.magnitude_meaning) bits.push("Magnitude: "+eff.magnitude_meaning);
  if(eff.duration_meaning) bits.push("Duration: "+eff.duration_meaning);
  if(eff.notes) bits.push("Note: "+eff.notes);
  return bits.join("\n");
}
/* R3.4 — short one-line summary of an action for a hover `title`. */
function actionSummaryText(a){
  if(!a) return "";
  const bits=[];
  bits.push((a.name||a.id||"action")+(a.id?" ("+a.id+")":""));
  if(a.aoe_pattern) bits.push(a.aoe_pattern+" · Size "+(a.aoe_size!=null?a.aoe_size:"?")+" · Range "+(a.aoe_range!=null?a.aoe_range:"?"));
  const dt=DAMAGE_TYPES.find(d=>d.value===a.damage_type);
  if(num(a.damage_modifier,0)>0) bits.push((dt?dt.label:"")+" ×"+(+num(a.damage_modifier,0))+" dmg");
  else bits.push("support");
  const e1=a.effect1&&a.effect1.effect_type, e2=a.effect2&&a.effect2.effect_type;
  if(e1||e2) bits.push("Effects: "+[e1,e2].filter(Boolean).join(" + "));
  if(a.notes) bits.push(a.notes);
  return bits.join("\n");
}
/* R3.5 — effect names appended to a collapsed action's meta line. */
function actionEffectNames(a){
  if(!a) return [];
  return [a.effect1&&a.effect1.effect_type, a.effect2&&a.effect2.effect_type].filter(Boolean);
}

/* ════════════════════════════════════════════════════════════════════
   ERROR BOUNDARY (per-tab)
   ════════════════════════════════════════════════════════════════════ */
class ErrorBoundary extends Component {
  constructor(p){ super(p); this.state={err:null}; }
  componentDidCatch(err){ this.setState({err}); console.error("[tab error]", err); }
  componentWillReceiveProps(next){ if(next.resetKey!==this.props.resetKey) this.setState({err:null}); }
  render(){
    if(this.state.err){
      return html`<div class="errbox">
        <h3>This tab hit an error</h3>
        <div>The rest of the editor still works. Switch tabs and back to retry.</div>
        <pre>${String(this.state.err && (this.state.err.stack || this.state.err.message) || this.state.err)}</pre>
      </div>`;
    }
    return this.props.children;
  }
}

function Select({value, options, onInput, mono=true, allowEmpty}){

  const opts = options.map(o => typeof o==="object" ? o : {value:o,label:(o===""?"— none —":String(o))});

      onChange=${e=>onInput(e.target.value)}>

    ${(!exists && value!=null && value!=="")?html`<option value=${value}>${value} (custom)</option>`:null}
  </select>`;

  return html`<select class="mono" value=${value==null?"":value}
